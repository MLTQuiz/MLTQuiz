<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chemistry Correlations Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            background: #f5f7fa;
            margin: clamp(calc(40px/3), calc(40vw/7.2), 40px);
            padding-right: 5vw;
            padding-left: 5vw;
            white-space: nowrap;
        }

        h1 {
            margin-bottom: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            font-size: clamp(calc(36px/3), calc(36vw/7.2), 36px);
        }

        h2 {
            font-size: clamp(calc(27px/3), calc(27vw/7.2), 27px);
        }

        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .category {
            display: inline-block;
            text-align: center;
            width: 100%;
            background: white;
            padding: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            border-radius: clamp(calc(8px/3), calc(8vw/7.2), 8px);
            box-shadow: 0 clamp(calc(2px/3), calc(2vw/7.2), 2px) clamp(calc(6px/3), calc(6vw/7.2), 6px) rgba(0, 0, 0, 0.1);
            margin-bottom: clamp(calc(15px/3), calc(15vw/7.2), 15px);
            box-sizing: border-box;
        }

        label {
            display: block;
            margin: clamp(calc(6px/3), calc(6vw/7.2), 6px) 0;
            cursor: pointer;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        .category-title {
            font-size: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            font-weight: bold;
        }

        .question {
            font-size: clamp(calc(24px/3), calc(24vw/7.2), 24px);
            font-weight: bold;
        }

        .main-title {
            font-size: clamp(calc(24px/3), calc(24vw/7.2), 24px);
            font-weight: bold;
        }

        #quizImage {
            margin-top: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            max-width: 100%;
            height: auto;
            border: clamp(calc(2px/3), calc(2vw/7.2), 2px) solid #ccc;
            border-radius: clamp(calc(6px/3), calc(6vw/7.2), 6px);
        }

        button {
            line-height: 1.2;
            font-size: clamp(calc(25px/3), calc(25vw/7.2), 25px);
            padding: clamp(calc(10px/3), calc(10vw/7.2), 10px) clamp(calc(18px/3), calc(18vw/7.2), 18px);
            border-radius: clamp(calc(5px/3), calc(5vw/7.2), 5px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        button-back {
            font-size: clamp(calc(15px/3), calc(15vw/7.2), 15px);
            padding: clamp(calc(8px/3), calc(8vw/7.2), 8px) clamp(calc(12px/3), calc(12vw/7.2), 12px);
            border-radius: clamp(calc(6px/3), calc(6vw/7.2), 6px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button-back:hover {
            background: #1f55c4;
        }

        .tab1 {
            margin-left: clamp(calc(25px/3), calc(25vw/7.2), 25px);
        }

        .tab2 {
            margin-left: clamp(calc(50px/3), calc(50vw/7.2), 50px);
        }

        #scrollMenu {
            max-height: 300px;
            overflow-y: auto;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            border: clamp(calc(1px/3), calc(1vw/7.2), 1px) solid #ccc;
            padding: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            margin-top: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            text-align: left;
            white-space: nowrap;
        }

        #answerOptions label {
            display: block;
            align-items: center;
            margin-bottom: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            cursor: pointer;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        #answerOptions input[type="radio"] {
            margin-right: clamp(calc(8px/3), calc(8vw/7.2), 8px);
        }

        #answerOptions br {
            display: none;
        }

        .large-textbox {
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        .large-textarea {
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            font-family: Arial, sans-serif;
            width: clamp(calc(500px/3), calc(500vw/7.2), 500px);
            height: clamp(calc(100px/3), calc(100vw/7.2), 100px);
            resize: none;
        }

        td:nth-child(2) {
            white-space: nowrap;
        }

        td:nth-child(1) {
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="quiz-container">
        <h1>Chemistry Correlations Quiz</h1>

        <div class="category">
            <div class="question">What disease state correlates best with these results?<br>You'll need to calculate the
                Anion/Osmo Gap.<br>Use the text box below to
                work through the case study!</div>

            <div id="labTableContainer"></div><br>

            <textarea class="large-textarea" placeholder="Type your thoughts here..."></textarea><br>
            <div id="feedback" style="margin-top: 10px; font-weight: bold"></div><br>
            <button onclick="revealAnswer()">Reveal Answer</button><br><br>
            <button onclick="nextQuestion()">Next Question</button>

            <br><br>
            <hr><br>

            <button-back id="muteBtn">🔊 Mute</button-back>
            <br><br><br>
            <button-back onclick="Back()">⬅ Back</button-back>
            <br><br><br>
            <button-back onclick="Home()">🏠 Home</button-back>

        </div>
    </div>

    <div style="height:2000px;"></div>

    <label class="tab2">
        <input type="checkbox" id="june_feedback">
        Junea Noises
    </label>

    <script>
        let showAnionGap = false;
        let chemRefs = {};
        let chemData = {};
        let currentCase = null;

        const analyteFormats = {
            "Cl": "Cl<sup>-</sup>",
            "HCO3-": "HCO<sub>3</sub><sup>-</sup>",
            "HbA1C": "HbA<sub>1</sub>C",
            "K": "K<sup>+</sup>",
            "Mg": "Mg<sup>2+</sup>",
            "Na": "Na<sup>+</sup>",
            "O2 Sat": "O<sub>2</sub> Sat",
            "pCO2": "pCO<sub>2</sub>",
            "pO2": "pO<sub>2</sub>",
            "TCO2": "TCO<sub>2</sub>"
        };

        function formatAnalyteLabel(label) {
            return analyteFormats[label] || label;
        }

        const unitFormats = {
            "x 10^9/L": "x 10<sup>9</sup>/L",
            "x 10^12/L": "x 10<sup>12</sup>/L"
        };

        function formatUnits(units) {
            return unitFormats[units] || units;
        }

        function similarity(a, b) {
            a = a.toLowerCase();
            b = b.toLowerCase();

            const longer = a.length > b.length ? a : b;
            const shorter = a.length > b.length ? b : a;

            const longerLength = longer.length;
            if (longerLength === 0) return 1;

            return (longerLength - editDistance(longer, shorter)) / longerLength;
        }

        function editDistance(a, b) {
            const matrix = [];

            for (let i = 0; i <= b.length; i++) {
                matrix[i] = [i];
            }

            for (let j = 0; j <= a.length; j++) {
                matrix[0][j] = j;
            }

            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }
                }
            }

            return matrix[b.length][a.length];
        }

        async function loadData() {
            const refRes = await fetch("refRanges.json");
            const corrRes = await fetch("chemCorrelations.json");

            chemRefs = await refRes.json();
            chemData = await corrRes.json();

            nextQuestion();
        }

        function getRandom(min, max, decimals) {
            const value = Math.random() * (max - min) + min;
            return value.toFixed(decimals);
        }

        function generateCase() {
            const selectedCases = JSON.parse(localStorage.getItem("selectedCases")) || [];

            let pool = [];

            selectedCases.forEach(item => {
                const [topic, disease] = item.split("|||");
                if (chemData[topic] && chemData[topic][disease]) {
                    pool.push({
                        disease,
                        analytes: chemData[topic][disease]
                    });
                }
            });

            if (pool.length === 0) {
                Object.keys(chemData).forEach(topic => {
                    Object.keys(chemData[topic]).forEach(disease => {
                        pool.push({
                            disease,
                            analytes: chemData[topic][disease]
                        });
                    });
                });
            }

            const chosen = pool[Math.floor(Math.random() * pool.length)];
            const disease = chosen.disease;
            const analytes = chosen.analytes;

            let resultsByAnalyzer = {};

            for (let key of Object.keys(analytes)) {
                const a = analytes[key];

                let value;
                if (a.value !== undefined && a.value !== "Calculate") {
                    value = a.value;
                } else if (a.low !== undefined) {
                    value = getRandom(
                        parseFloat(a.low),
                        parseFloat(a.high),
                        parseInt(a.decimal ?? 0)
                    );
                }

                const analyzer = chemRefs["Reference Ranges"][key]?.analyzer || "Other";

                if (!resultsByAnalyzer[analyzer]) resultsByAnalyzer[analyzer] = {};

                resultsByAnalyzer[analyzer][key] = {
                    value: value,
                    units: a.units || "",
                    decimal: a.decimal ?? 0
                };
            }

            if (resultsByAnalyzer["Hemostasis Results"]?.PT && analytes["INR"]) {
                const pt = parseFloat(resultsByAnalyzer["Hemostasis Results"].PT.value);
                if (!isNaN(pt)) {
                    resultsByAnalyzer["Hemostasis Results"].INR = {
                        value: (pt / 13.1).toFixed(1),
                        units: "",
                        decimal: 1
                    };
                }
            }

            if (analytes["pH"] && analytes["pH"].value === "Calculate") {
                const hco3 = parseFloat(resultsByAnalyzer["Blood Gas Results"]?.["HCO3-"]?.value);
                const pco2 = parseFloat(resultsByAnalyzer["Blood Gas Results"]?.["pCO2"]?.value);
                if (!isNaN(hco3) && !isNaN(pco2) && pco2 !== 0) {
                    const pH = 6.1 + Math.log10(hco3 / (0.03 * pco2));
                    resultsByAnalyzer["Blood Gas Results"].pH = {
                        value: pH.toFixed(2),
                        units: "",
                        decimal: 2
                    };
                }
            }

            if (analytes["Anion Gap"]) {
                const agData = analytes["Anion Gap"];
                const low = parseFloat(agData.low);
                const high = parseFloat(agData.high);
                const decimals = parseInt(agData.decimal ?? 0);

                let attempts = 0;
                let valid = false;

                while (attempts < 50 && !valid) {
                    attempts++;
                    const na = parseFloat(getRandom(
                        analytes["Na"].low,
                        analytes["Na"].high,
                        analytes["Na"].decimal
                    ));
                    const cl = parseFloat(getRandom(
                        analytes["Cl"].low,
                        analytes["Cl"].high,
                        analytes["Cl"].decimal
                    ));
                    const tco2 = parseFloat(getRandom(
                        analytes["TCO2"].low,
                        analytes["TCO2"].high,
                        analytes["TCO2"].decimal
                    ));
                    const ag = na - cl - tco2;

                    if (ag >= low && ag <= high) {
                        resultsByAnalyzer["Serum Chemistry Results"].Na.value = na.toFixed(analytes["Na"].decimal);
                        resultsByAnalyzer["Serum Chemistry Results"].Cl.value = cl.toFixed(analytes["Cl"].decimal);
                        resultsByAnalyzer["Serum Chemistry Results"].TCO2.value = tco2.toFixed(analytes["TCO2"].decimal);

                        resultsByAnalyzer["Serum Chemistry Results"]["Anion Gap"] = {
                            value: ag.toFixed(decimals),
                            units: agData.units,
                            decimal: decimals
                        };

                        valid = true;
                    }
                }

                if (!valid) {
                    const na = parseFloat(resultsByAnalyzer["Serum Chemistry Results"].Na.value);
                    const cl = parseFloat(resultsByAnalyzer["Serum Chemistry Results"].Cl.value);
                    const tco2 = parseFloat(resultsByAnalyzer["Serum Chemistry Results"].TCO2.value);
                    const ag = na - cl - tco2;

                    resultsByAnalyzer["Serum Chemistry Results"]["Anion Gap"] = {
                        value: ag.toFixed(decimals),
                        units: agData.units,
                        decimal: decimals
                    };
                }
            }

            return { disease, resultsByAnalyzer };
        }


        function formatReferenceRange(analyte) {
            const data = chemRefs["Reference Ranges"][analyte];
            if (!data) return "";

            const units = data.units ? ` ${data.units}` : "";

            if (data.note) {
                return data.note.replace(/\n/g, "<br>");
            }

            const ref = data.ref;
            if (!ref) return "";

            const decimals = data.decimal ?? null;

            const format = (num) => {
                if (num === undefined) return "";
                if (decimals !== null && !isNaN(num)) {
                    return Number(num).toFixed(decimals);
                }
                return num;
            };

            if (ref.male || ref.female) {
                let text = "";

                if (ref.female) {
                    text += `Female: ${format(ref.female.low)} - ${format(ref.female.high)}${units}`;
                }

                if (ref.male) {
                    if (text) text += "<br>";
                    text += `Male: ${format(ref.male.low)} - ${format(ref.male.high)}${units}`;
                }

                return text;
            }

            if (ref.peak || ref.trough) {
                let text = "";

                if (ref.peak) {
                    text += `Peak: ${format(ref.peak.low)} - ${format(ref.peak.high)}${units}`;
                }

                if (ref.trough) {
                    if (text) text += "<br>";
                    text += `Trough: ${format(ref.trough.low)} - ${format(ref.trough.high)}${units}`;
                }

                return text;
            }

            if (ref.low !== undefined && ref.high !== undefined) {
                return `${format(ref.low)} - ${format(ref.high)}${units}`;
            }

            if (ref.high !== undefined) {
                return `< ${format(ref.high)}${units}`;
            }

            if (ref.low !== undefined) {
                return `> ${format(ref.low)}${units}`;
            }

            return "";
        }

        function getFlag(key, value) {
            if (value === "" || isNaN(value)) return "";

            const data = chemRefs["Reference Ranges"][key];
            if (!data) return "";

            const ref = data.ref || {};
            const crit = data.critical || {};

            let low = ref.low;
            let high = ref.high;

            if (ref.male || ref.female) {
                low = Math.min(
                    ref.male?.low ?? Infinity,
                    ref.female?.low ?? Infinity
                );
                high = Math.max(
                    ref.male?.high ?? -Infinity,
                    ref.female?.high ?? -Infinity
                );
            }

            if (crit.low !== undefined && value < crit.low) return "▼ PL";
            if (crit.high !== undefined && value > crit.high) return "▲ PH";

            if (low !== undefined && value < low) return "▽";
            if (high !== undefined && value > high) return "△";

            return "";
        }

        function renderTable(caseData) {
            const container = document.getElementById("labTableContainer");
            let html = "";

            for (let analyzer in caseData.resultsByAnalyzer) {
                const analytes = caseData.resultsByAnalyzer[analyzer];
                let rows = "";

                for (let key in analytes) {
                    const r = analytes[key];
                    const ref = formatReferenceRange(key);

                    rows += `
                <tr>
                    <td>${formatAnalyteLabel(key)}</td>
                    <td style="font-size:clamp(calc(18px/3), calc(18vw/7.2), 18px); white-space: nowrap;">
                        ${(key === "Anion Gap") && !showAnionGap
                            ? `__ ${r.units || ""}`
                            : `${r.value}${r.units ? " " + r.units : ""} ${getFlag(key, parseFloat(r.value))}`
                        }
                    </td>
                    <td>${ref}</td>
                </tr>
            `;
                }

                html += `
            <table border="1" style="font-size:clamp(calc(18px/3), calc(18vw/7.2), 18px); width:100%; border-collapse: collapse; margin-top:20px;">
                <tr>
                    <th colspan="3" style="text-align:center; background:#f0f0f0;">
                        ${analyzer}
                    </th>
                </tr>
                <tr>
                    <th>Analyte</th>
                    <th>Result</th>
                    <th>Reference Range</th>
                </tr>
                ${rows}
            </table>
        `;
            }

            container.innerHTML = html;
        }

        function revealAnswer() {
            const feedback = document.getElementById("feedback");

            if (!currentCase) return;

            const userInput = document.querySelector(".large-textarea").value.trim().toLowerCase();
            const correctAnswer = currentCase.disease.toLowerCase();

            const score = similarity(userInput, correctAnswer);

            let color = "orange";

            if (score > 0.6) {
                color = "green";
                playCorrect();
            } else {
                playWrong();
            }

            feedback.innerHTML = `
        <span style="color:${color};">
            Answer: ${currentCase.disease}
        </span>
    `;

            showAnionGap = true;
            renderTable(currentCase);
        }

        function nextQuestion() {
            currentCase = generateCase();

            showAnionGap = false;

            renderTable(currentCase);

            document.getElementById("feedback").textContent = "";

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }

        loadData();

        let muted = true;

        const correctSound = new Audio();
        const wrongSound = new Audio();

        const muteBtn = document.getElementById("muteBtn");
        const juneCheckbox = document.getElementById("june_feedback");

        if (muteBtn) muteBtn.textContent = "🔇 Unmute";

        function updateSounds() {
            const juneEnabled = juneCheckbox?.checked;

            if (juneEnabled) {
                correctSound.src = "sounds/June - I'm eating yogurt.wav";
                wrongSound.src = "sounds/June - Yell 2 (Short).wav";

                document.body.style.backgroundImage = "url('June.jpg')";
                document.body.style.backgroundSize = "33.33vw auto";
                document.body.style.backgroundRepeat = "repeat";
                document.body.style.backgroundPosition = "top left";

            } else {
                correctSound.src = "sounds/correct1.mp3";
                wrongSound.src = "";

                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#f5f7fa";
            }

            correctSound.muted = muted;
            wrongSound.muted = muted;
        }

        function playCorrect() {
            if (!muted && correctSound.src) {
                correctSound.currentTime = 0;
                correctSound.play().catch(() => { });
            }
        }

        function playWrong() {
            if (!muted && wrongSound.src) {
                wrongSound.currentTime = 0;
                wrongSound.play().catch(() => { });
            }
        }

        function toggleMute() {
            muted = !muted;

            correctSound.muted = muted;
            wrongSound.muted = muted;

            if (muteBtn) {
                muteBtn.textContent = muted ? "🔇 Unmute" : "🔊 Mute";
            }
        }

        muteBtn?.addEventListener("click", toggleMute);
        juneCheckbox?.addEventListener("change", updateSounds);

        updateSounds();

        function Back() {
            window.location.href = "chemistry_correlationschoices.html";
        }

        function Home() {
            window.location.href = "index.html";
        }

    </script>

</body>

</html>
