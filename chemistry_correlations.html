<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chemistry Correlations Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: clamp(calc(18px / 3), calc(18vw / 7.2), 18px);
            background: #f5f7fa;
            margin: clamp(calc(40px / 3), calc(40vw / 7.2), 40px);
            padding-right: 5vw;
            padding-left: 5vw;
        }

        h1 {
            margin-bottom: clamp(calc(10px / 3), calc(10vw / 7.2), 10px);
            font-size: clamp(calc(36px / 3), calc(36vw / 7.2), 36px);
        }

        h2 {
            font-size: clamp(calc(27px / 3), calc(27vw / 7.2), 27px);
        }

        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .category {
            display: inline-block;
            text-align: center;
            width: 100%;
            background: white;
            padding: clamp(calc(20px / 3), calc(20vw / 7.2), 20px);
            border-radius: clamp(calc(8px / 3), calc(8vw / 7.2), 8px);
            box-shadow: 0 clamp(calc(2px / 3), calc(2vw / 7.2), 2px) clamp(calc(6px / 3), calc(6vw / 7.2), 6px) rgba(0, 0, 0, 0.1);
            margin-bottom: clamp(calc(15px / 3), calc(15vw / 7.2), 15px);
            box-sizing: border-box;
        }

        label {
            display: block;
            margin: clamp(calc(6px / 3), calc(6vw / 7.2), 6px) 0;
            cursor: pointer;
            font-size: clamp(calc(18px / 3), calc(18vw / 7.2), 18px);
        }

        .category-title {
            font-size: clamp(calc(20px / 3), calc(20vw / 7.2), 20px);
            font-weight: bold;
        }

        .question {
            font-size: clamp(calc(24px / 3), calc(24vw / 7.2), 24px);
            font-weight: bold;
        }

        .main-title {
            font-size: clamp(calc(24px / 3), calc(24vw / 7.2), 24px);
            font-weight: bold;
        }

        #quizImage {
            margin-top: clamp(calc(20px / 3), calc(20vw / 7.2), 20px);
            max-width: 100%;
            height: auto;
            border: clamp(calc(2px / 3), calc(2vw / 7.2), 2px) solid #ccc;
            border-radius: clamp(calc(6px / 3), calc(6vw / 7.2), 6px);
        }

        button {
            line-height: 1.2;
            font-size: clamp(calc(25px / 3), calc(25vw / 7.2), 25px);
            padding: clamp(calc(10px / 3), calc(10vw / 7.2), 10px) clamp(calc(18px / 3), calc(18vw / 7.2), 18px);
            border-radius: clamp(calc(5px / 3), calc(5vw / 7.2), 5px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        button-back {
            font-size: clamp(calc(15px / 3), calc(15vw / 7.2), 15px);
            padding: clamp(calc(8px / 3), calc(8vw / 7.2), 8px) clamp(calc(12px / 3), calc(12vw / 7.2), 12px);
            border-radius: clamp(calc(6px / 3), calc(6vw / 7.2), 6px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button-back:hover {
            background: #1f55c4;
        }

        .tab1 {
            margin-left: clamp(calc(25px / 3), calc(25vw / 7.2), 25px);
        }

        .tab2 {
            margin-left: clamp(calc(50px / 3), calc(50vw / 7.2), 50px);
        }

        #scrollMenu {
            max-height: 300px;
            overflow-y: auto;
            font-size: clamp(calc(18px / 3), calc(18vw / 7.2), 18px);
            border: clamp(calc(1px / 3), calc(1vw / 7.2), 1px) solid #ccc;
            padding: clamp(calc(10px / 3), calc(10vw / 7.2), 10px);
            margin-top: clamp(calc(20px / 3), calc(20vw / 7.2), 20px);
            text-align: left;
            white-space: nowrap;
        }

        #answerOptions label {
            display: block;
            align-items: center;
            margin-bottom: clamp(calc(10px / 3), calc(10vw / 7.2), 10px);
            cursor: pointer;
            font-size: clamp(calc(18px / 3), calc(18vw / 7.2), 18px);
        }

        #answerOptions input[type="radio"] {
            margin-right: clamp(calc(8px / 3), calc(8vw / 7.2), 8px);
        }

        #answerOptions br {
            display: none;
        }

        .large-textbox {
            font-size: clamp(calc(18px / 3), calc(18vw / 7.2), 18px);
        }

        .large-textarea {
            font-size: clamp(calc(18px / 3), calc(18vw / 7.2), 18px);
            font-family: Arial, sans-serif;
            width: clamp(calc(500px / 3), calc(500vw / 7.2), 500px);
            height: clamp(calc(100px / 3), calc(100vw / 7.2), 100px);
            resize: none;
        }

        #labTableContainer {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: clamp(10px, 2.5vw, 18px);
        }

        td {
            overflow-wrap: break-word;
        }

        th {
            text-align: center;
            background: none;
        }

        th[colspan="3"] {
            background: #f0f0f0;
        }

        td:nth-child(1),
        th:nth-child(1),
        td:nth-child(2),
        th:nth-child(2) {
            white-space: nowrap;
            width: 1%;
        }

        td:nth-child(3),
        th:nth-child(3) {
            width: auto;
            white-space: normal;
        }
    </style>
</head>

<body>
    <div class="quiz-container">
        <h1>Chemistry Correlations Quiz</h1>

        <div class="category">
            <div class="question">
                What disease state correlates best with these results?<br />You'll
                need to calculate the Anion/Osmo Gap.<br />Use the text box below to
                work through the case study!
            </div>

            <div id="labTableContainer"></div>
            <br />

            <textarea class="large-textarea" placeholder="Type your thoughts here..."></textarea><br />
            <div id="feedback" style="margin-top: 10px; font-weight: bold"></div>
            <br />
            <button onclick="revealAnswer()">Reveal Answer</button><br /><br />
            <button onclick="nextQuestion()">Next Question</button>

            <br /><br />
            <hr />
            <br />

            <button-back id="muteBtn">🔊 Mute</button-back>
            <br /><br /><br />
            <button-back onclick="Back()">⬅ Back</button-back>
            <br /><br /><br />
            <button-back onclick="Home()">🏠 Home</button-back>
        </div>
    </div>

    <div style="height: 2000px"></div>

    <label class="tab2">
        <input type="checkbox" id="june_feedback" />
        Junea Noises
    </label>

    <script>
        let showAnionGap = false;
        let chemRefs = {};
        let chemData = {};
        let currentCase = null;

        const analyteFormats = {
            "Cl": "Cl<sup>-</sup>",
            "HCO3-": "HCO<sub>3</sub><sup>-</sup>",
            "HbA1C": "HbA<sub>1</sub>C",
            "K": "K<sup>+</sup>",
            "Mg": "Mg<sup>2+</sup>",
            "Na": "Na<sup>+</sup>",
            "SO2": "SO<sub>2</sub>",
            "pCO2": "pCO<sub>2</sub>",
            "pO2": "pO<sub>2</sub>",
            "TCO2": "TCO<sub>2</sub>"
        };

        function formatAnalyteLabel(label) {
            return analyteFormats[label] || label;
        }

        const unitFormats = {
            "x 10^6/L": "x 10<sup>6</sup>/L",
            "x 10^9/L": "x 10<sup>9</sup>/L",
            "x 10^12/L": "x 10<sup>12</sup>/L"
        };

        function formatUnits(units) {
            return unitFormats[units] || units;
        }

        function similarity(a, b) {
            a = a.toLowerCase();
            b = b.toLowerCase();

            const longer = a.length > b.length ? a : b;
            const shorter = a.length > b.length ? b : a;

            const longerLength = longer.length;
            if (longerLength === 0) return 1;

            return (longerLength - editDistance(longer, shorter)) / longerLength;
        }

        function editDistance(a, b) {
            const matrix = [];

            for (let i = 0; i <= b.length; i++) {
                matrix[i] = [i];
            }

            for (let j = 0; j <= a.length; j++) {
                matrix[0][j] = j;
            }

            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1,
                        );
                    }
                }
            }

            return matrix[b.length][a.length];
        }

        let chemPanels = {};

        async function loadData() {
            const refRes = await fetch("refRanges.json");
            const corrRes = await fetch("chem_correlations/chemCorrelations.json");
            const panelRes = await fetch("chem_correlations/panels.json")

            chemRefs = await refRes.json();
            chemData = await corrRes.json();
            chemPanels = await panelRes.json();

            nextQuestion();
        }

        function normalRandom(mean, sd) {
            let u = 0, v = 0;

            while (u === 0) u = Math.random();
            while (v === 0) v = Math.random();

            const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);

            return mean + z * sd;
        }

        function getAnalyteValue(key, analytes, refs) {
            const a = analytes[key];

            if (!a) return null;

            // 1. If explicit value exists → ALWAYS use it (even if string)
            if (a.value !== undefined && a.value !== "Calculate") {
                return a.value; // <- IMPORTANT: do NOT parseFloat
            }

            if (a?.low !== undefined && a?.high !== undefined) {
                return parseFloat(a.low + Math.random() * (a.high - a.low));
            }

            // 2. Normal physiology from reference range (THIS is your new system)
            const ref = refs["Reference Ranges"][key]?.ref;
            if (ref?.low !== undefined && ref?.high !== undefined) {

                const mean = (parseFloat(ref.low) + parseFloat(ref.high)) / 2;
                const sd = 2; // fixed as you requested

                return normalRandom(mean, sd);
            }

            return null;
        }

        function generateCase() {
            const selectedCases =
                JSON.parse(localStorage.getItem("selectedCases")) || [];

            let pool = [];

            selectedCases.forEach((item) => {
                const [topic, disease] = item.split("|||");
                if (chemData[topic] && chemData[topic][disease]) {
                    pool.push({
                        disease,
                        data: chemData[topic][disease],
                    });
                }
            });

            if (pool.length === 0) {
                Object.keys(chemData).forEach((topic) => {
                    Object.keys(chemData[topic]).forEach((disease) => {
                        pool.push({
                            disease,
                            data: chemData[topic][disease],
                        });
                    });
                });
            }

            const chosen = pool[Math.floor(Math.random() * pool.length)];
            const disease = chosen.disease;
            const caseData = chosen.data;

            // 🆕 STEP 1: Get analytes from panels (if they exist)
            let analyteKeys = new Set();

            if (Array.isArray(caseData.panels)) {
                caseData.panels.forEach(panelName => {
                    const panel = chemPanels?.panels?.[panelName];
                    if (!panel?.analytes) return;

                    panel.analytes.forEach(a => analyteKeys.add(a));
                });
            }

            // 🆕 STEP 2: Add explicitly defined analytes (from your existing JSON)
            Object.keys(caseData).forEach(key => {
                if (key !== "panels") {
                    analyteKeys.add(key);
                }
            });

            // 🆕 STEP 3: Build analyte definitions
            let analytes = {};

            analyteKeys.forEach(key => {
                if (caseData[key]) {
                    // Use disease-specific override
                    analytes[key] = caseData[key];
                } else if (chemRefs["Reference Ranges"][key]) {
                    // Fallback to normal reference range
                    const ref = chemRefs["Reference Ranges"][key];

                    if (ref.ref?.low !== undefined && ref.ref?.high !== undefined) {
                        analytes[key] = {
                            low: ref.ref.low,
                            high: ref.ref.high,
                            units: ref.units,
                            decimal: ref.decimal ?? 0
                        };
                    }
                }
            });

            // 🆕 STEP 4: Generate results (same as your original logic)
            let resultsByAnalyzer = {};

            for (let key of Object.keys(analytes)) {

                const value = getAnalyteValue(key, analytes, chemRefs);

                const analyzer =
                    chemRefs["Reference Ranges"][key]?.analyzer || "Other";

                if (!resultsByAnalyzer[analyzer]) {
                    resultsByAnalyzer[analyzer] = {};
                }

                const refMeta = chemRefs["Reference Ranges"][key];
                const diseaseMeta = analytes[key];

                const isCustomString = typeof value === "string";

                resultsByAnalyzer[analyzer][key] = {
                    value,
                    units: isCustomString ? "" : (refMeta?.units ?? ""),
                    decimal: refMeta?.decimal ?? 0,
                };
            }

            // 🧪 KEEP your existing special calculations (unchanged)

            if (resultsByAnalyzer["Hemostasis Results"]?.PT && analytes["INR"]) {
                const pt = parseFloat(
                    resultsByAnalyzer["Hemostasis Results"].PT.value,
                );
                if (!isNaN(pt)) {
                    resultsByAnalyzer["Hemostasis Results"].INR = {
                        value: (pt / 13.1).toFixed(1),
                        units: "",
                        decimal: 1,
                    };
                }
            }

            if (analytes["pH"] && analytes["pH"].value === "Calculate") {
                const hco3 = parseFloat(
                    resultsByAnalyzer["Blood Gas Results"]?.["HCO3-"]?.value,
                );
                const pco2 = parseFloat(
                    resultsByAnalyzer["Blood Gas Results"]?.["pCO2"]?.value,
                );
                if (!isNaN(hco3) && !isNaN(pco2) && pco2 !== 0) {
                    const pH = 6.1 + Math.log10(hco3 / (0.03 * pco2));
                    resultsByAnalyzer["Blood Gas Results"].pH = {
                        value: pH.toFixed(2),
                        units: "",
                        decimal: 2,
                    };
                }
            }

            // 🧮 AGAP logic (CONSTRAINT-SAFE VERSION)
            if (analytes["AGAP"]) {
                const agRef = chemRefs["Reference Ranges"]["AGAP"];

                const agLow = agRef?.ref?.low;
                const agHigh = agRef?.ref?.high;
                const decimals = agRef?.decimal ?? 0;

                const naRef = chemRefs["Reference Ranges"]["Na"];
                const clRef = chemRefs["Reference Ranges"]["Cl"]["ref"];
                const tco2Ref = chemRefs["Reference Ranges"]["TCO2"];

                let attempts = 0;
                let success = false;

                while (attempts < 100 && !success) {
                    attempts++;

                    // 1. Generate Na + TCO2 first (stable anchors)
                    const Na_raw = getAnalyteValue("Na", analytes, chemRefs);
                    const TCO2_raw = getAnalyteValue("TCO2", analytes, chemRefs);

                    const Na = Number(Math.round(Na_raw));
                    const TCO2 = Number(Math.round(TCO2_raw));

                    // 2. Compute valid AG range that keeps Cl in range
                    const agMin = Na - TCO2 - clRef.high; // highest Cl → lowest AG
                    const agMax = Na - TCO2 - clRef.low;  // lowest Cl → highest AG

                    // 3. Intersect with disease target range
                    const finalMin = Math.max(agMin, agLow);
                    const finalMax = Math.min(agMax, agHigh);

                    if (finalMin > finalMax) continue; // no solution for this Na/TCO2

                    // 4. Pick AG inside valid window
                    const AG = finalMin + Math.random() * (finalMax - finalMin);

                    // 5. Solve Cl directly (NO random Cl)
                    const Cl = Na - TCO2 - AG;

                    // 6. Final safety check (floating precision)
                    if (Cl < clRef.low || Cl > clRef.high) continue;

                    // 7. Commit results
                    const chem = resultsByAnalyzer["Serum Chemistry Results"];

                    chem.Na.value = Na.toFixed(naRef.decimal);
                    chem.TCO2.value = TCO2.toFixed(tco2Ref.decimal);
                    chem.Cl.value = Cl.toFixed(clRef.decimal);

                    chem["AGAP"] = {
                        value: AG.toFixed(decimals),
                        units: agRef?.units ?? "",
                        decimal: decimals
                    };

                    console.log({ Na_raw, TCO2_raw, Na, TCO2, clRef });

                    success = true;
                }
            }

            return { disease, resultsByAnalyzer };
        }

        function formatValue(value, decimals) {
            if (value === null || value === undefined) return "";

            const num = Number(value);

            if (!isFinite(num)) return value; // preserves strings like "Decreased ▽"

            return num.toFixed(decimals ?? 0);
        }

        function formatReferenceRange(analyte) {
            const data = chemRefs["Reference Ranges"][analyte];
            if (!data) return "";

            const units = data.units ? ` ${data.units}` : "";

            if (data.note) {
                return data.note.replace(/\n/g, "<br>");
            }

            const ref = data.ref;
            if (!ref) return "";

            const decimals = data.decimal ?? null;

            const format = (num) => {
                if (num === undefined) return "";
                if (decimals !== null && !isNaN(num)) {
                    return Number(num).toFixed(decimals);
                }
                return num;
            };

            if (ref.male || ref.female) {
                let text = "";

                if (ref.female) {
                    text += `Female: ${format(ref.female.low)} - ${format(ref.female.high)}${units}`;
                }

                if (ref.male) {
                    if (text) text += "<br>";
                    text += `Male: ${format(ref.male.low)} - ${format(ref.male.high)}${units}`;
                }

                return text;
            }

            if (ref.peak || ref.trough) {
                let text = "";

                if (ref.peak) {
                    text += `Peak: ${format(ref.peak.low)} - ${format(ref.peak.high)}${units}`;
                }

                if (ref.trough) {
                    if (text) text += "<br>";
                    text += `Trough: ${format(ref.trough.low)} - ${format(ref.trough.high)}${units}`;
                }

                return text;
            }

            if (ref.low !== undefined && ref.high !== undefined) {
                return `${format(ref.low)} - ${format(ref.high)}${units}`;
            }

            if (ref.high !== undefined) {
                return `< ${format(ref.high)}${units}`;
            }

            if (ref.low !== undefined) {
                return `> ${format(ref.low)}${units}`;
            }

            return "";
        }

        function getFlag(key, value) {
            if (value === "" || isNaN(value)) return "";

            const data = chemRefs["Reference Ranges"][key];
            if (!data) return "";

            const ref = data.ref || {};
            const crit = data.critical || {};

            let low = ref.low;
            let high = ref.high;

            if (ref.male || ref.female) {
                low = Math.min(
                    ref.male?.low ?? Infinity,
                    ref.female?.low ?? Infinity,
                );
                high = Math.max(
                    ref.male?.high ?? -Infinity,
                    ref.female?.high ?? -Infinity,
                );
            }

            if (crit.low !== undefined && value < crit.low) return "▼ PL";
            if (crit.high !== undefined && value > crit.high) return "▲ PH";

            if (low !== undefined && value < low) return "▽";
            if (high !== undefined && value > high) return "△";

            return "";
        }

        function renderTable(caseData) {
            const container = document.getElementById("labTableContainer");
            let html = "";

            for (let analyzer in caseData.resultsByAnalyzer) {
                const analytes = caseData.resultsByAnalyzer[analyzer];
                let rows = "";

                for (let key in analytes) {
                    const r = analytes[key];
                    const ref = formatReferenceRange(key);

                    rows += `
<tr>
    <td>${formatAnalyteLabel(key)}</td>
    <td>
        ${key === "AGAP" && !showAnionGap
                            ? `__ ${r.units || ""}`
                            : `${formatValue(r.value, r.decimal)}${r.units ? " " + r.units : ""} ${getFlag(key, parseFloat(r.value))}`
                        }
    </td>
    <td>${ref}</td>
</tr>
`;
                }

                html += `
<table border="1">
    <tr>
        <th colspan="3">
            ${analyzer}
        </th>
    </tr>
    <tr>
        <th>Analyte</th>
        <th>Result</th>
        <th>Reference Range</th>
    </tr>
    ${rows}
</table>
`;
            }

            container.innerHTML = html;
        }

        function revealAnswer() {
            const feedback = document.getElementById("feedback");

            if (!currentCase) return;

            const userInput = document
                .querySelector(".large-textarea")
                .value.trim()
                .toLowerCase();
            const correctAnswer = currentCase.disease.toLowerCase();

            const score = similarity(userInput, correctAnswer);

            let color = "orange";

            if (score > 0.6) {
                color = "green";
                playCorrect();
            } else {
                playWrong();
            }

            feedback.innerHTML = `
        <span style="color:${color};">
            Answer: ${currentCase.disease}
        </span>
    `;

            showAnionGap = true;
            renderTable(currentCase);
        }

        function nextQuestion() {
            currentCase = generateCase();

            showAnionGap = false;

            renderTable(currentCase);

            document.getElementById("feedback").textContent = "";

            window.scrollTo({
                top: 0,
                behavior: "smooth",
            });
        }

        loadData();

        let muted = true;

        const correctSound = new Audio();
        const wrongSound = new Audio();

        const muteBtn = document.getElementById("muteBtn");
        const juneCheckbox = document.getElementById("june_feedback");

        if (muteBtn) muteBtn.textContent = "🔇 Unmute";

        function updateSounds() {
            const juneEnabled = juneCheckbox?.checked;

            if (juneEnabled) {
                correctSound.src = "sounds/June - I'm eating yogurt.wav";
                wrongSound.src = "sounds/June - Yell 2 (Short).wav";

                document.body.style.backgroundImage = "url('June.jpg')";
                document.body.style.backgroundSize = "33.33vw auto";
                document.body.style.backgroundRepeat = "repeat";
                document.body.style.backgroundPosition = "top left";
            } else {
                correctSound.src = "sounds/correct1.mp3";
                wrongSound.src = "";

                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#f5f7fa";
            }

            correctSound.muted = muted;
            wrongSound.muted = muted;
        }

        function playCorrect() {
            if (!muted && correctSound.src) {
                correctSound.currentTime = 0;
                correctSound.play().catch(() => { });
            }
        }

        function playWrong() {
            if (!muted && wrongSound.src) {
                wrongSound.currentTime = 0;
                wrongSound.play().catch(() => { });
            }
        }

        function toggleMute() {
            muted = !muted;

            correctSound.muted = muted;
            wrongSound.muted = muted;

            if (muteBtn) {
                muteBtn.textContent = muted ? "🔇 Unmute" : "🔊 Mute";
            }
        }

        muteBtn?.addEventListener("click", toggleMute);
        juneCheckbox?.addEventListener("change", updateSounds);

        updateSounds();

        function Back() {
            window.location.href = "chemistry_correlationschoices.html";
        }

        function Home() {
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
