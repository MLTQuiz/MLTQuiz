<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urine Microscopy Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            background: #f5f7fa;
            margin: clamp(calc(40px/3), calc(40vw/7.2), 40px);
            padding-right: 5vw;
            padding-left: 5vw;
        }

        h1 {
            margin-bottom: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            font-size: clamp(calc(36px/3), calc(36vw/7.2), 36px);
        }

        h2 {
            font-size: clamp(calc(27px/3), calc(27vw/7.2), 27px);
        }

        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .category {
            display: inline-block;
            text-align: center;
            width: 100%;
            background: white;
            padding: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            border-radius: clamp(calc(8px/3), calc(8vw/7.2), 8px);
            box-shadow: 0 clamp(calc(2px/3), calc(2vw/7.2), 2px) clamp(calc(6px/3), calc(6vw/7.2), 6px) rgba(0, 0, 0, 0.1);
            margin-bottom: clamp(calc(15px/3), calc(15vw/7.2), 15px);
            box-sizing: border-box;
        }

        label {
            display: block;
            margin: clamp(calc(6px/3), calc(6vw/7.2), 6px) 0;
            cursor: pointer;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        .category-title {
            font-size: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            font-weight: bold;
        }

        .question {
            font-size: clamp(calc(24px/3), calc(24vw/7.2), 24px);
            font-weight: bold;
        }

        .main-title {
            font-size: clamp(calc(24px/3), calc(24vw/7.2), 24px);
            font-weight: bold;
        }

        #quizImage {
            margin-top: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            max-width: 100%;
            height: auto;
            border: clamp(calc(2px/3), calc(2vw/7.2), 2px) solid #ccc;
            border-radius: clamp(calc(6px/3), calc(6vw/7.2), 6px);
        }

        button {
            line-height: 1.2;
            font-size: clamp(calc(25px/3), calc(25vw/7.2), 25px);
            padding: clamp(calc(10px/3), calc(10vw/7.2), 10px) clamp(calc(18px/3), calc(18vw/7.2), 18px);
            border-radius: clamp(calc(5px/3), calc(5vw/7.2), 5px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        button-back {
            font-size: clamp(calc(15px/3), calc(15vw/7.2), 15px);
            padding: clamp(calc(8px/3), calc(8vw/7.2), 8px) clamp(calc(12px/3), calc(12vw/7.2), 12px);
            border-radius: clamp(calc(6px/3), calc(6vw/7.2), 6px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button-back:hover {
            background: #1f55c4;
        }

        .tab1 {
            margin-left: clamp(calc(25px/3), calc(25vw/7.2), 25px);
        }

        .tab2 {
            margin-left: clamp(calc(50px/3), calc(50vw/7.2), 50px);
        }

        #scrollMenu {
            max-height: 300px;
            overflow-y: auto;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            border: clamp(calc(1px/3), calc(1vw/7.2), 1px) solid #ccc;
            padding: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            margin-top: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            text-align: left;
            white-space: nowrap;
        }

        #answerOptions label {
            display: block;
            align-items: center;
            margin-bottom: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            cursor: pointer;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            white-space: normal;
            word-break: break-word;
        }

        #answerOptions input[type="radio"] {
            margin-right: clamp(calc(8px/3), calc(8vw/7.2), 8px);
        }

        #answerOptions br {
            display: none;
        }

        .large-textbox {
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        .large-textarea {
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            font-family: Arial, sans-serif;
            width: clamp(calc(500px/3), calc(500vw/7.2), 500px);
            height: clamp(calc(100px/3), calc(100vw/7.2), 100px);
            resize: none;
        }

        td:nth-child(2) {
            white-space: nowrap;
        }

        td:nth-child(1) {
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div class="quiz-container">
        <h1>Urine Microscopy Quiz</h1>

        <div class="category">
            <div class="question">What is shown in the photo?</div>
            <img id="quizImage" src="" />

            <div id="answerOptions"></div>
            <div id="feedback"></div>

            <br>
            <button onclick="nextQuestion()">Next Question</button>

            <br><br>
            <hr><br>


            <button-back id="muteBtn">🔊 Mute</button-back>
            <br><br><br>
            <button-back onclick="Back()">⬅ Back</button-back>
            <br><br><br>
            <button-back onclick="Home()">🏠 Home</button-back>
        </div>
    </div>

    <div style="height:2000px;"></div>

    <label class="tab2">
        <input type="checkbox" id="june_feedback">
        Junea Noises
    </label>

    <script>

        let quizPool = [];
        let currentQuestion = 0;
        let imageDatabase = {};

        let muted = true;

        const correctSound = new Audio();
        const wrongSound = new Audio();

        const muteBtn = document.getElementById("muteBtn");
        const juneCheckbox = document.getElementById("june_feedback");

        if (muteBtn) muteBtn.textContent = "🔇 Unmute";

        function updateSounds() {
            const juneEnabled = juneCheckbox?.checked;

            if (juneEnabled) {
                correctSound.src = "sounds/June - I'm eating yogurt.wav";
                wrongSound.src = "sounds/June - Yell 2 (Short).wav";

                document.body.style.backgroundImage = "url('June.jpg')";
                document.body.style.backgroundSize = "33.33vw auto";
                document.body.style.backgroundRepeat = "repeat";
                document.body.style.backgroundPosition = "top left";

            } else {
                correctSound.src = "sounds/correct.mp3";
                wrongSound.src = "";

                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#f5f7fa";
            }

            correctSound.muted = muted;
            wrongSound.muted = muted;
        }

        function playCorrect() {
            if (!muted && correctSound.src) {
                correctSound.currentTime = 0;
                correctSound.play().catch(() => { });
            }
        }

        function playWrong() {
            if (!muted && wrongSound.src) {
                wrongSound.currentTime = 0;
                wrongSound.play().catch(() => { });
            }
        }

        function toggleMute() {
            muted = !muted;

            correctSound.muted = muted;
            wrongSound.muted = muted;

            if (muteBtn) {
                muteBtn.textContent = muted ? "🔇 Unmute" : "🔊 Mute";
            }
        }

        muteBtn?.addEventListener("click", toggleMute);
        juneCheckbox?.addEventListener("change", updateSounds);

        updateSounds();

        fetch("chemistryImageDatabase.json")
            .then(res => res.json())
            .then(db => {
                imageDatabase = db;
                buildQuizPool();
                showNextImage();
            });

        function buildQuizPool() {

            quizPool = [];

            const categoryPrefix = {
                Casts: "c1",
                Cells: "c2",
                Crystals: "c3",
                Other: "o1",
            };

            Object.keys(imageDatabase).forEach(cat => {


                const catData = imageDatabase[cat];

                Object.keys(catData).forEach(subtype => {

                    const { count, code, prefix } = catData[subtype];

                    const finalPrefix = prefix || categoryPrefix[cat];

                    for (let i = 1; i <= count; i++) {
                        const num = String(i).padStart(2, "0");

                        quizPool.push({
                            path: `chem_images/${finalPrefix}${code}${num}.webp`,
                            subtype,
                            category: cat
                        });
                    }
                });
            });

            shuffleArray(quizPool);
        }

        function showNextImage() {

            if (quizPool.length === 0) return;

            const item = quizPool[currentQuestion % quizPool.length];

            document.getElementById("quizImage").src = item.path;

            const optionsEl = document.getElementById("answerOptions");
            const feedbackEl = document.getElementById("feedback");

            optionsEl.innerHTML = "";
            feedbackEl.textContent = "";

            Object.keys(imageDatabase).forEach(cat => {

                const catData = imageDatabase[cat];

                const categoryTitle = document.createElement("div");
                categoryTitle.textContent = cat;
                categoryTitle.style.fontWeight = "bold";
                categoryTitle.style.fontSize = "20px";
                categoryTitle.style.marginTop = "28px";
                categoryTitle.style.marginBottom = "5px";

                optionsEl.appendChild(categoryTitle);

                Object.keys(catData).forEach(subtype => {

                    const label = document.createElement("label");

                    const radio = document.createElement("input");
                    radio.type = "radio";
                    radio.name = "answer";
                    radio.value = subtype;

                    radio.addEventListener("change", () => {
                        if (radio.value === item.subtype) {
                            feedbackEl.textContent = "Correct! 🎉";
                            feedbackEl.style.color = "green";
                            playCorrect();
                        } else {
                            feedbackEl.textContent = "Try again!";
                            feedbackEl.style.color = "red";
                            playWrong();
                        }
                    });

                    label.appendChild(radio);
                    label.append(" " + subtype.replace(/_/g, " "));
                    optionsEl.appendChild(label);
                });

            });

            currentQuestion++;
        }

        function nextQuestion() {
            showNextImage();

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function Back() {
            window.location.href = "chemistry_choices.html";
        }

        function Home() {
            window.location.href = "index.html";
        }

    </script>

</body>

</html>
