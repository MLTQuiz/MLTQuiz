<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cell Identification</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 40px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .category {
            background: white;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin: 6px 0;
            cursor: pointer;
        }

        .category-title {
            font-weight: bold;
            font-size: 20px;
        }

        .main-title {
            font-size: 24px;
            font-weight: bold;
        }

        button {
            font-size: 22px;
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        backbutton {
            font-size: 15px;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
            text-decoration: none;
        }

        backbutton:hover {
            background: #1f55c4;
        }

        .tab1 {
            margin-left: 25px;
        }

        .tab2 {
            margin-left: 50px;
        }

        /* 🔥 Scroll menu styling */
        #scrollMenu {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
            background: white;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <h1>Hematology Cell Identification</h1>
    <h2>Which cells would you like to be quizzed on?</h2>

    <div class="category">
        <label>
            <input type="checkbox" class="allCells">
            <span class="main-title">All Cell Types</span>
        </label>

        <label class="tab1">
            <input type="checkbox" class="group-parent" data-group="rbc">
            <span class="category-title">All RBCs</span>
        </label>

        <label class="tab2">
            <input type="checkbox" class="child rbc" value="rbc_inclusions">
            RBC Inclusions
        </label>

        <label class="tab2">
            <input type="checkbox" class="child rbc" value="rbc_morphology">
            RBC Morphology
        </label>

        <label class="tab2">
            <input type="checkbox" class="child rbc" value="rbc_stages">
            RBC Maturation Stages
        </label>

        <label class="tab1">
            <input type="checkbox" class="group-parent" data-group="wbc">
            <span class="category-title">All WBCs</span>
        </label>

        <label class="tab2">
            <input type="checkbox" class="child wbc" value="wbc_normal">
            Normal WBCs
        </label>

        <label class="tab2">
            <input type="checkbox" class="child wbc" value="wbc_inclusions">
            WBC Abnormalities
        </label>

        <label class="tab2">
            <input type="checkbox" class="child wbc" value="wbc_stages">
            WBC Maturation Stages
        </label>

        <!-- 🔥 NEW SCROLL MENU -->
        <hr>
        <h3>Or select individual cells:</h3>
        <div id="scrollMenu"></div>

        <br>
        <button onclick="startQuiz()">Begin Quiz</button>

        <hr><br>
        <backbutton onclick="Back()">Back</backbutton><br><br>
        <backbutton onclick="Home()">Home</backbutton>

        <div style="height:2000px;"></div>

        <label class="tab2">
            <input type="checkbox" id="hard_mode">
            Hard Mode!!!
        </label>

        <script>

            const allCells = document.querySelector(".allCells");
            const groupParents = document.querySelectorAll(".group-parent");
            const children = document.querySelectorAll(".child");

            /* 🔥 CLEAR SCROLL MENU */
            function clearScrollMenuSelection() {
                document.querySelectorAll("#scrollMenu input")
                    .forEach(cb => cb.checked = false);
            }

            /* 🔥 CLEAR CATEGORY SYSTEM */
            function clearCategorySelection() {
                allCells.checked = false;
                groupParents.forEach(p => p.checked = false);
                children.forEach(c => c.checked = false);
            }

            /* 🔥 ORIGINAL LOGIC + HOOKS */

            allCells.addEventListener("change", () => {

                clearScrollMenuSelection(); // 🔥 NEW

                groupParents.forEach(p => p.checked = allCells.checked);
                children.forEach(c => c.checked = allCells.checked);

            });

            groupParents.forEach(parent => {
                parent.addEventListener("change", () => {

                    clearScrollMenuSelection(); // 🔥 NEW

                    const group = parent.dataset.group;
                    const groupChildren = document.querySelectorAll("." + group);
                    groupChildren.forEach(child => child.checked = parent.checked);

                    updateAllCells();
                });
            });

            children.forEach(child => {
                child.addEventListener("change", () => {

                    clearScrollMenuSelection(); // 🔥 NEW

                    const group = [...child.classList].find(c => c !== "child");
                    const groupChildren = document.querySelectorAll("." + group);
                    const parent = document.querySelector(`[data-group="${group}"]`);

                    parent.checked = [...groupChildren].every(c => c.checked);
                    updateAllCells();
                });
            });

            function updateAllCells() {
                allCells.checked = [...groupParents].every(p => p.checked);
            }

            /* 🔥 SCROLL MENU BUILD */
            let imageDatabase = {};

            fetch("hematologyImageDatabase.json")
                .then(res => res.json())
                .then(db => {
                    imageDatabase = db;
                    buildScrollMenu();
                });

            function buildScrollMenu() {
                const menu = document.getElementById("scrollMenu");

                Object.keys(imageDatabase).forEach(category => {

                    if (category === "hard_mode") return;

                    const header = document.createElement("div");
                    header.textContent = category === "standalone"
                        ? "Others"
                        : category.replace(/_/g, " ").toUpperCase();

                    header.style.fontWeight = "bold";
                    header.style.marginTop = "10px";
                    menu.appendChild(header);

                    const catData = imageDatabase[category];

                    Object.keys(catData).forEach(subtype => {

                        const label = document.createElement("label");

                        const cb = document.createElement("input");
                        cb.type = "checkbox";
                        cb.value = subtype;

                        /* 🔥 CLEAR CATEGORY SYSTEM */
                        cb.addEventListener("change", () => {
                            clearCategorySelection();
                        });

                        label.appendChild(cb);
                        label.append(" " + subtype.replace(/_/g, " "));
                        menu.appendChild(label);
                    });
                });
            }

            /* 🔥 UPDATED START QUIZ */
            function startQuiz() {

                const selectedCategories = [...document.querySelectorAll('.child:checked')]
                    .map(cb => cb.value);

                const selectedSubtypes = [...document.querySelectorAll('#scrollMenu input:checked')]
                    .map(cb => cb.value);

                const hardModeCheckbox = document.getElementById("hard_mode");
                const hardMode = hardModeCheckbox.checked;

                if (selectedSubtypes.length > 0) {

                    localStorage.setItem("quizSubtypes", JSON.stringify(selectedSubtypes));
                    localStorage.setItem("quizMode", "subtypes");

                } else if (selectedCategories.length > 0 || hardMode) {

                    if (hardMode) selectedCategories.push("hard_mode");

                    localStorage.setItem("quizCells", JSON.stringify(selectedCategories));
                    localStorage.setItem("quizMode", "categories");

                } else {
                    alert("Please select at least one option.");
                    return;
                }

                localStorage.setItem("hardMode", hardMode);

                window.location.href = "hematology_cellidquiz.html";
            }

            function Back() {
                window.location.href = "hematology_choice.html";
            }

            function Home() {
                window.location.href = "index.html";
            }

        </script>
</body>

</html>
