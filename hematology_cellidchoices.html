<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hematology Cell ID</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            background: #f5f7fa;
            margin: clamp(calc(40px/3), calc(40vw/7.2), 40px);
            padding-right: 5vw;
            padding-left: 5vw;
            white-space: nowrap;
        }

        h1 {
            margin-bottom: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            font-size: clamp(calc(36px/3), calc(36vw/7.2), 36px);
        }

        h2 {
            font-size: clamp(calc(27px/3), calc(27vw/7.2), 27px);
        }

        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .category {
            display: inline-block;
            text-align: left;
            width: 100%;
            background: white;
            padding: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            border-radius: clamp(calc(8px/3), calc(8vw/7.2), 8px);
            box-shadow: 0 clamp(calc(2px/3), calc(2vw/7.2), 2px) clamp(calc(6px/3), calc(6vw/7.2), 6px) rgba(0, 0, 0, 0.1);
            margin-bottom: clamp(calc(15px/3), calc(15vw/7.2), 15px);
            box-sizing: border-box;
        }

        label {
            display: block;
            margin: clamp(calc(6px/3), calc(6vw/7.2), 6px) 0;
            cursor: text;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        .category-title {
            font-size: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            font-weight: bold;
        }

        .question {
            font-size: clamp(calc(24px/3), calc(24vw/7.2), 24px);
            font-weight: bold;
        }

        .main-title {
            font-size: clamp(calc(24px/3), calc(24vw/7.2), 24px);
            font-weight: bold;
        }

        #quizImage {
            margin-top: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            max-width: 100%;
            height: auto;
            border: clamp(calc(2px/3), calc(2vw/7.2), 2px) solid #ccc;
            border-radius: clamp(calc(6px/3), calc(6vw/7.2), 6px);
        }

        button {
            line-height: 1.2;
            font-size: clamp(calc(25px/3), calc(25vw/7.2), 25px);
            padding: clamp(calc(10px/3), calc(10vw/7.2), 10px) clamp(calc(18px/3), calc(18vw/7.2), 18px);
            border-radius: clamp(calc(5px/3), calc(5vw/7.2), 5px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        button-back {
            font-size: clamp(calc(15px/3), calc(15vw/7.2), 15px);
            padding: clamp(calc(8px/3), calc(8vw/7.2), 8px) clamp(calc(12px/3), calc(12vw/7.2), 12px);
            border-radius: clamp(calc(6px/3), calc(6vw/7.2), 6px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button-back:hover {
            background: #1f55c4;
        }

        .tab1 {
            margin-left: clamp(calc(25px/3), calc(25vw/7.2), 25px);
        }

        .tab2 {
            margin-left: clamp(calc(50px/3), calc(50vw/7.2), 50px);
        }

        #scrollMenu {
            max-height: 300px;
            overflow-y: auto;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            border: clamp(calc(1px/3), calc(1vw/7.2), 1px) solid #ccc;
            padding: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            margin-top: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            text-align: left;
            white-space: nowrap;
        }

        #answerOptions label {
            display: block;
            align-items: center;
            margin-bottom: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            cursor: pointer;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        #answerOptions input[type="radio"] {
            margin-right: clamp(calc(8px/3), calc(8vw/7.2), 8px);
        }

        #answerOptions br {
            display: none;
        }

        .large-textbox {
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        .large-textarea {
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            font-family: Arial, sans-serif;
            width: clamp(calc(500px/3), calc(500vw/7.2), 500px);
            height: clamp(calc(100px/3), calc(100vw/7.2), 100px);
            resize: none;
        }

        td:nth-child(2) {
            white-space: nowrap;
        }

        td:nth-child(1) {
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <h1>Hematology Cell Identification</h1>
    <h2>Which cells would you like to be quizzed on?</h2>

    <div class="category">
        <label>
            <input type="checkbox" class="allCells">
            <span class="main-title">All Cell Types</span>
        </label>

        <label class="tab1">
            <input type="checkbox" class="group-parent" data-group="rbc">
            <span class="category-title">All RBCs</span>
        </label>

        <label class="tab2">
            <input type="checkbox" class="child rbc" value="rbc_inclusions">
            RBC Inclusions
        </label>

        <label class="tab2">
            <input type="checkbox" class="child rbc" value="rbc_morphology">
            RBC Morphology
        </label>

        <label class="tab2">
            <input type="checkbox" class="child rbc" value="rbc_stages">
            RBC Maturation Stages
        </label>

        <label class="tab1">
            <input type="checkbox" class="group-parent" data-group="wbc">
            <span class="category-title">All WBCs</span>
        </label>

        <label class="tab2">
            <input type="checkbox" class="child wbc" value="wbc_normal">
            Normal WBCs
        </label>

        <label class="tab2">
            <input type="checkbox" class="child wbc" value="wbc_inclusions">
            WBC Abnormalities
        </label>

        <label class="tab2">
            <input type="checkbox" class="child wbc" value="wbc_stages">
            WBC Maturation Stages
        </label>
        <hr>

        <label class="main-title">Or select individual cells:</label>
        <div id="scrollMenu"></div>
        <br>

        <button onclick="startQuiz()">Begin Quiz</button>

        <br><br><hr><br>

        <button-back onclick="Back()">⬅ Back</button-back>
        <br><br><br>
        <button-back onclick="Home()">🏠 Home</button-back>
    </div>

    <div style="height:2000px;"></div>

    <label class="tab2">
        <input type="checkbox" id="hard_mode">
        Hard Mode!!!
    </label>

    <script>

        const allCells = document.querySelector(".allCells");
        const groupParents = document.querySelectorAll(".group-parent");
        const children = document.querySelectorAll(".child");

        function clearScrollMenuSelection() {
            document.querySelectorAll("#scrollMenu input")
                .forEach(cb => cb.checked = false);
        }

        function clearCategorySelection() {
            allCells.checked = false;
            groupParents.forEach(p => p.checked = false);
            children.forEach(c => c.checked = false);
        }

        allCells.addEventListener("change", () => {

            clearScrollMenuSelection();

            groupParents.forEach(p => p.checked = allCells.checked);
            children.forEach(c => c.checked = allCells.checked);

        });

        groupParents.forEach(parent => {
            parent.addEventListener("change", () => {

                clearScrollMenuSelection();

                const group = parent.dataset.group;
                const groupChildren = document.querySelectorAll("." + group);
                groupChildren.forEach(child => child.checked = parent.checked);

                updateAllCells();
            });
        });

        children.forEach(child => {
            child.addEventListener("change", () => {

                clearScrollMenuSelection();

                const group = [...child.classList].find(c => c !== "child");
                const groupChildren = document.querySelectorAll("." + group);
                const parent = document.querySelector(`[data-group="${group}"]`);

                parent.checked = [...groupChildren].every(c => c.checked);
                updateAllCells();
            });
        });

        function updateAllCells() {
            allCells.checked = [...groupParents].every(p => p.checked);
        }

        let imageDatabase = {};

        fetch("hematologyImageDatabase.json")
            .then(res => res.json())
            .then(db => {
                imageDatabase = db;
                buildScrollMenu();
            });

        function buildScrollMenu() {
            const menu = document.getElementById("scrollMenu");

            Object.keys(imageDatabase).forEach(category => {

                if (category === "hard_mode") return;

                const header = document.createElement("div");
                header.textContent = category === "standalone"
                    ? "Others"
                    : category.replace(/_/g, " ").toUpperCase();

                header.style.fontWeight = "bold";
                header.style.marginTop = "10px";
                menu.appendChild(header);

                const catData = imageDatabase[category];

                Object.keys(catData).forEach(subtype => {

                    const label = document.createElement("label");

                    const cb = document.createElement("input");
                    cb.type = "checkbox";
                    cb.value = subtype;

                    cb.addEventListener("change", () => {
                        clearCategorySelection();
                    });

                    label.appendChild(cb);
                    label.append(" " + subtype.replace(/_/g, " "));
                    menu.appendChild(label);
                });
            });
        }

        function startQuiz() {

            const selectedCategories = [...document.querySelectorAll('.child:checked')]
                .map(cb => cb.value);

            const selectedSubtypes = [...document.querySelectorAll('#scrollMenu input:checked')]
                .map(cb => cb.value);

            const hardModeCheckbox = document.getElementById("hard_mode");
            const hardMode = hardModeCheckbox.checked;

            if (selectedSubtypes.length > 0) {

                localStorage.setItem("quizSubtypes", JSON.stringify(selectedSubtypes));
                localStorage.setItem("quizMode", "subtypes");

            } else if (selectedCategories.length > 0 || hardMode) {

                if (hardMode) selectedCategories.push("hard_mode");

                localStorage.setItem("quizCells", JSON.stringify(selectedCategories));
                localStorage.setItem("quizMode", "categories");

            } else {
                alert("Please select at least one option.");
                return;
            }

            localStorage.setItem("hardMode", hardMode);

            window.location.href = "hematology_cellidquiz.html";
        }

        function Back() {
            window.location.href = "hematology_choice.html";
        }

        function Home() {
            window.location.href = "index.html";
        }

    </script>
</body>

</html>
