<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hematology Cell Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            margin: 40px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .quiz-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .category {
            display: inline-block;
            text-align: left;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            font-size: large;
        }

        label {
            display: block;
            margin: 6px 0;
            cursor: pointer;
        }

        .category-title {
            font-weight: bold;
            font-size: 20px;
        }

        .question {
            font-size: 24px;
            font-weight: bold;
        }

        button {
            font-size: 22px;
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        .button-back {
            font-size: 15px;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        .button-back:hover {
            background: #1f55c4;
        }

        #quizImage {
            margin-top: 20px;
            max-width: 100%;
            height: auto;
            border: 2px solid #ccc;
            border-radius: 6px;
        }

        #answerOptions label {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
        }

        #answerOptions br {
            display: none;
        }
    </style>
</head>

<body>
    <div class="quiz-container">
        <h1>Hematology Cell Identification Quiz</h1>

        <div class="category">
            <span class="question">What cell is this?</span><br />
            <img id="quizImage" src="" alt="Good luck!" /><br />

            <div id="answerOptions" style="margin-top: 15px"></div>
            <div id="feedback" style="margin-top: 10px; font-weight: bold"></div>

            <br /><br />
            <button onclick="nextQuestion()">Next Question</button>
        </div>

        <hr />
        <br />

        <button class="button-back" onclick="Back()">Change Cells</button><br><br>
        <button class="button-back" onclick="Home()">Home</button><br><br>
        <button class="button-back" id="muteBtn">🔊 Mute</button>
    </div>

    <div style="height:2000px;"></div>

    <label class="tab2">
        <input type="checkbox" id="june_feedback">
        Junea Noises
    </label>

    <script>
        let selectedCategories = JSON.parse(
            localStorage.getItem("quizCells") || "[]",
        );
        if (selectedCategories.length === 0) {
            alert("No categories selected! Please go back and choose cells.");
            window.location.href = "hematology_cellidchoices.html";
        }

        let quizPool = [];
        let currentQuestion = 0;
        let imageDatabase = {};

        fetch("hematologyImageDatabase.json")
            .then((res) => res.json())
            .then((db) => {
                imageDatabase = db;
                buildQuizPool();
                showNextImage();
            })
            .catch((err) => console.error("Error loading image database:", err));

        function buildQuizPool() {
            quizPool = [];

            const categoryPrefix = {
                rbc_morphology: "r1",
                rbc_stages: "r2",
                rbc_inclusions: "r3",
                wbc_normal: "w1",
                wbc_stages: "w2",
                wbc_inclusions: "w3",
            };

            selectedCategories.forEach((cat) => {

                if (cat === "hard_mode") {

                    const included = imageDatabase.hard_mode.include || [];
                    const customCells = imageDatabase.hard_mode.custom || {};

                    const added = new Set();

                    Object.keys(imageDatabase).forEach(category => {

                        if (category === "hard_mode") return;

                        const catData = imageDatabase[category];
                        const prefix = categoryPrefix[category];

                        Object.keys(catData).forEach(subtype => {

                            if (!included.includes(subtype)) return;

                            const key = category + "_" + subtype;
                            if (added.has(key)) return;
                            added.add(key);

                            const { count, code } = catData[subtype];

                            for (let i = 1; i <= count; i++) {
                                const num = String(i).padStart(2, "0");

                                quizPool.push({
                                    path: `hema_images/${prefix}${code}${num}.webp`,
                                    category,
                                    subtype
                                });
                            }
                        });
                    });

                    Object.keys(customCells).forEach(subtype => {

                        const { count, code, prefix } = customCells[subtype];

                        for (let i = 1; i <= count; i++) {
                            const num = String(i).padStart(2, "0");

                            quizPool.push({
                                path: `hema_images/${prefix}${code}${num}.webp`,
                                category: "hard_mode",
                                subtype
                            });
                        }
                    });

                    return;
                }

                const catData = imageDatabase[cat];
                if (!catData) return;

                const prefix = categoryPrefix[cat];

                Object.keys(catData).forEach(subtype => {
                    const { count, code } = catData[subtype];

                    for (let i = 1; i <= count; i++) {
                        const num = String(i).padStart(2, "0");

                        quizPool.push({
                            path: `hema_images/${prefix}${code}${num}.webp`,
                            category: cat,
                            subtype: subtype
                        });
                    }
                });
            });

            shuffleArray(quizPool);
        }

        function nextQuestion() {
            showNextImage();
        }

        function getHardModeAnswers() {
            const include = imageDatabase.hard_mode.include || [];
            const custom = Object.keys(imageDatabase.hard_mode.custom || {});

            const combined = [...include, ...custom];

            const unique = [...new Set(combined)];

            return unique.sort((a, b) =>
                a.replace(/_/g, " ").localeCompare(b.replace(/_/g, " "))
            );
        }

        function showNextImage() {
            const imgEl = document.getElementById("quizImage");
            const feedbackEl = document.getElementById("feedback");
            const optionsEl = document.getElementById("answerOptions");

            feedbackEl.textContent = "";
            optionsEl.innerHTML = "";

            if (currentQuestion >= quizPool.length) {
                currentQuestion = 0;
                shuffleArray(quizPool);
            }

            const currentItem = quizPool[currentQuestion];
            const currentImagePath = currentItem.path;
            imgEl.src = currentImagePath;

            const correctCategory = currentItem.category;
            const correctAnswer = currentItem.subtype;

            let subtypes;

            if (selectedCategories.includes("hard_mode")) {
                subtypes = getHardModeAnswers();
            } else {
                subtypes = Object.keys(imageDatabase[correctCategory]);
            }
            subtypes.forEach((subtype) => {
                const label = document.createElement("label");
                label.style.display = "block";
                label.style.marginBottom = "8px";
                label.style.cursor = "pointer";

                const radio = document.createElement("input");
                radio.type = "radio";
                radio.name = "answer";
                radio.value = subtype;

                radio.addEventListener("change", () => {
                    if (radio.value === correctAnswer) {
                        feedbackEl.textContent = "Correct! 🎉";
                        feedbackEl.style.color = "green";
                        playCorrect();

                    } else {
                        feedbackEl.textContent = "Try again!";
                        feedbackEl.style.color = "red";
                        playWrong();
                    }
                });

                label.appendChild(radio);
                label.appendChild(document.createTextNode(" " + subtype.replace(/_/g, " ")));

                optionsEl.appendChild(label);
            });

            currentQuestion++;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        let muted = true;

        const correctSound = new Audio();
        const wrongSound = new Audio();

        const muteBtn = document.getElementById("muteBtn");
        const juneCheckbox = document.getElementById("june_feedback");

        muteBtn.textContent = "🔇 Unmute";

        function updateSounds() {
            const juneEnabled = juneCheckbox.checked;

            if (juneEnabled) {
                correctSound.src = "sounds/June - One more.wav";
                wrongSound.src = "sounds/June - Yell 2 (Short).wav";

                document.body.style.backgroundImage = "url('June.jpg')";
                document.body.style.backgroundSize = "33.33vw auto"; // 🔥 3 across
                document.body.style.backgroundRepeat = "repeat";
                document.body.style.backgroundPosition = "top left";

            } else {
                correctSound.src = "sounds/correct.mp3";
                wrongSound.src = "";

                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#ffffff";
            }

            correctSound.muted = muted;
            wrongSound.muted = muted;
        }

        function playCorrect() {
            if (!muted && correctSound.src) {
                correctSound.currentTime = 0;
                correctSound.play().catch(() => { });
            }
        }

        function playWrong() {
            if (!muted && wrongSound.src) {
                wrongSound.currentTime = 0;
                wrongSound.play().catch(() => { });
            }
        }

        function toggleMute() {
            muted = !muted;

            correctSound.muted = muted;
            wrongSound.muted = muted;

            muteBtn.textContent = muted ? "🔇 Unmute" : "🔊 Mute";
        }

        muteBtn.addEventListener("click", toggleMute);
        juneCheckbox.addEventListener("change", updateSounds);

        updateSounds();

        function Back() {
            window.location.href = "hematology_cellidchoices.html";
        }

        function Home() {
            window.location.href = "index.html";
        }

    </script>
</body>

</html>
