<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hematology Cell Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: large;
            background: #f5f7fa;
            margin: 40px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .quiz-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .category {
            display: inline-block;
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin: 6px 0;
            cursor: pointer;
        }

        .category-title {
            font-weight: bold;
            font-size: 20px;
        }

        .question {
            font-size: 24px;
            font-weight: bold;
        }

        .main-title {
            font-size: 24px;
            font-weight: bold;
        }

        #quizImage {
            margin-top: 20px;
            max-width: 100%;
            height: auto;
            border: 2px solid #ccc;
            border-radius: 6px;
        }

        button {
            font-size: 25px;
            padding: 10px 18px;
            border-radius: 5px;
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        button-back {
            font-size: 15px;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button-back:hover {
            background: #1f55c4;
        }

        #scrollMenu {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 20px;
            text-align: left;
        }

        .menu-header {
            font-weight: bold;
            margin-top: 10px;
        }

        #answerOptions label {
            display: block;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: large;
        }

        #answerOptions input[type="radio"] {
            margin-right: 8px;
        }

        #answerOptions br {
            display: none;
        }

        .large-textbox {
            font-size: large;
        }
    </style>
</head>

<body>

    <div class="quiz-container">
        <h1>Hematology Cell Identification Quiz</h1>

        <div class="category">
            <div class="question">What cell is this?</div>
            <img id="quizImage" src="" />

            <div id="answerOptions"></div>
            <div id="feedback"></div>

            <br>
            <button onclick="nextQuestion()">Next Question</button>

            <br><br><hr><br>

            <button-back id="muteBtn">🔊 Mute</button-back>
            <br><br><br>
            <button-back onclick="Back()">Back</button-back>
            <br><br><br>
            <button-back onclick="Home()">Home</button-back>

        </div>
    </div>

    <div style="height:2000px;"></div>

    <label class="tab2">
        <input type="checkbox" id="june_feedback">
        Junea Noises
    </label>

    <script>

        let quizMode = localStorage.getItem("quizMode");

        let selectedCategories = JSON.parse(localStorage.getItem("quizCells") || "[]");
        let selectedSubtypes = JSON.parse(localStorage.getItem("quizSubtypes") || "[]");
        let hardMode = JSON.parse(localStorage.getItem("hardMode") || "false");

        if (
            (quizMode === "categories" && selectedCategories.length === 0 && !hardMode) ||
            (quizMode === "subtypes" && selectedSubtypes.length === 0 && !hardMode)
        ) {
            alert("No cells selected!");
            window.location.href = "hematology_cellidchoices.html";
        }

        let quizPool = [];
        let currentQuestion = 0;
        let imageDatabase = {};

        let muted = true;

        const correctSound = new Audio();
        const wrongSound = new Audio();

        const muteBtn = document.getElementById("muteBtn");
        const juneCheckbox = document.getElementById("june_feedback");

        if (muteBtn) muteBtn.textContent = "🔇 Unmute";

        function updateSounds() {
            const juneEnabled = juneCheckbox?.checked;

            if (juneEnabled) {
                correctSound.src = "sounds/June - One more.wav";
                wrongSound.src = "sounds/June - Yell 2 (Short).wav";

                document.body.style.backgroundImage = "url('June.jpg')";
                document.body.style.backgroundSize = "33.33vw auto";
                document.body.style.backgroundRepeat = "repeat";
                document.body.style.backgroundPosition = "top left";

            } else {
                correctSound.src = "sounds/correct.mp3";
                wrongSound.src = "";

                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#ffffff";
            }

            correctSound.muted = muted;
            wrongSound.muted = muted;
        }

        function playCorrect() {
            if (!muted && correctSound.src) {
                correctSound.currentTime = 0;
                correctSound.play().catch(() => { });
            }
        }

        function playWrong() {
            if (!muted && wrongSound.src) {
                wrongSound.currentTime = 0;
                wrongSound.play().catch(() => { });
            }
        }

        function toggleMute() {
            muted = !muted;

            correctSound.muted = muted;
            wrongSound.muted = muted;

            if (muteBtn) {
                muteBtn.textContent = muted ? "🔇 Unmute" : "🔊 Mute";
            }
        }

        muteBtn?.addEventListener("click", toggleMute);
        juneCheckbox?.addEventListener("change", updateSounds);

        updateSounds();

        fetch("hematologyImageDatabase.json")
            .then(res => res.json())
            .then(db => {
                imageDatabase = db;
                buildQuizPool();
                showNextImage();
            });

        function buildQuizPool() {

            quizPool = [];

            const categoryPrefix = {
                rbc_morphology: "r2",
                rbc_stages: "r3",
                rbc_inclusions: "r1",
                wbc_normal: "w1",
                wbc_stages: "w3",
                wbc_inclusions: "w2"
            };

            if (hardMode) {

                const include = imageDatabase.hard_mode.include || [];
                const custom = imageDatabase.hard_mode.custom || {};

                Object.keys(imageDatabase).forEach(cat => {

                    if (cat === "hard_mode") return;

                    const catData = imageDatabase[cat];

                    Object.keys(catData).forEach(subtype => {

                        if (!include.includes(subtype)) return;

                        const { count, code } = catData[subtype];
                        const prefix = categoryPrefix[cat];

                        for (let i = 1; i <= count; i++) {
                            const num = String(i).padStart(2, "0");

                            quizPool.push({
                                path: `hema_images/${prefix}${code}${num}.webp`,
                                subtype,
                                category: cat
                            });
                        }
                    });
                });

                Object.keys(custom).forEach(subtype => {

                    const { count, code, prefix } = custom[subtype];

                    for (let i = 1; i <= count; i++) {
                        const num = String(i).padStart(2, "0");

                        quizPool.push({
                            path: `hema_images/${prefix}${code}${num}.webp`,
                            subtype,
                            category: "hard_mode"
                        });
                    }
                });

                shuffleArray(quizPool);
                return;
            }

            if (quizMode === "subtypes") {

                Object.keys(imageDatabase).forEach(cat => {

                    if (cat === "hard_mode") return;

                    const catData = imageDatabase[cat];

                    Object.keys(catData).forEach(subtype => {

                        if (!selectedSubtypes.includes(subtype)) return;

                        const { count, code, prefix } = catData[subtype];
                        const finalPrefix = prefix || categoryPrefix[cat];

                        for (let i = 1; i <= count; i++) {
                            const num = String(i).padStart(2, "0");

                            quizPool.push({
                                path: `hema_images/${finalPrefix}${code}${num}.webp`,
                                subtype,
                                category: cat
                            });
                        }
                    });
                });

            } else {

                selectedCategories.forEach(cat => {

                    const catData = imageDatabase[cat];
                    if (!catData) return;

                    const prefix = categoryPrefix[cat];

                    Object.keys(catData).forEach(subtype => {

                        const { count, code } = catData[subtype];

                        for (let i = 1; i <= count; i++) {
                            const num = String(i).padStart(2, "0");

                            quizPool.push({
                                path: `hema_images/${prefix}${code}${num}.webp`,
                                subtype,
                                category: cat
                            });
                        }
                    });
                });
            }

            shuffleArray(quizPool);
        }

        function showNextImage() {

            if (quizPool.length === 0) return;

            const item = quizPool[currentQuestion % quizPool.length];

            document.getElementById("quizImage").src = item.path;

            const optionsEl = document.getElementById("answerOptions");
            const feedbackEl = document.getElementById("feedback");

            optionsEl.innerHTML = "";
            feedbackEl.textContent = "";

            let answers;

            if (hardMode) {
                answers = [...new Set([
                    ...imageDatabase.hard_mode.include,
                    ...Object.keys(imageDatabase.hard_mode.custom || {})
                ])];
            }
            else if (quizMode === "subtypes") {
                answers = selectedSubtypes;
            }
            else {
                const currentCategory = item.category;

                if (imageDatabase[currentCategory]) {
                    answers = Object.keys(imageDatabase[currentCategory]);
                } else {
                    answers = [];
                }
            }

            answers.forEach(subtype => {

                const label = document.createElement("label");

                const radio = document.createElement("input");
                radio.type = "radio";
                radio.name = "answer";
                radio.value = subtype;

                radio.addEventListener("change", () => {
                    if (radio.value === item.subtype) {
                        feedbackEl.textContent = "Correct! 🎉";
                        feedbackEl.style.color = "green";
                        playCorrect();
                    } else {
                        feedbackEl.textContent = "Try again!";
                        feedbackEl.style.color = "red";
                        playWrong();
                    }
                });

                label.appendChild(radio);
                label.append(" " + subtype.replace(/_/g, " "));
                optionsEl.appendChild(label);
            });

            currentQuestion++;
        }

        function nextQuestion() {
            showNextImage();
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function Back() {
            window.location.href = "hematology_cellidchoices.html";
        }

        function Home() {
            window.location.href = "index.html";
        }

    </script>

</body>

</html>
