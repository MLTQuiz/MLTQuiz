<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histology Stain Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            background: #f5f7fa;
            margin: clamp(calc(40px/3), calc(40vw/7.2), 40px);
            padding-right: 5vw;
            padding-left: 5vw;
        }

        h1 {
            margin-bottom: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            font-size: clamp(calc(36px/3), calc(36vw/7.2), 36px);
        }

        h2 {
            font-size: clamp(calc(27px/3), calc(27vw/7.2), 27px);
        }

        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .category {
            display: inline-block;
            text-align: center;
            width: 100%;
            background: white;
            padding: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            border-radius: clamp(calc(8px/3), calc(8vw/7.2), 8px);
            box-shadow: 0 clamp(calc(2px/3), calc(2vw/7.2), 2px) clamp(calc(6px/3), calc(6vw/7.2), 6px) rgba(0, 0, 0, 0.1);
            margin-bottom: clamp(calc(15px/3), calc(15vw/7.2), 15px);
            box-sizing: border-box;
        }

        label {
            display: block;
            margin: clamp(calc(6px/3), calc(6vw/7.2), 6px) 0;
            cursor: text;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        .category-title {
            font-size: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            font-weight: bold;
        }

        .question {
            font-size: clamp(calc(24px/3), calc(24vw/7.2), 24px);
            font-weight: bold;
        }

        .main-title {
            font-size: clamp(calc(24px/3), calc(24vw/7.2), 24px);
            font-weight: bold;
        }

        #quizImage {
            margin-top: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            max-width: 100%;
            height: auto;
            border: clamp(calc(2px/3), calc(2vw/7.2), 2px) solid #ccc;
            border-radius: clamp(calc(6px/3), calc(6vw/7.2), 6px);
        }

        button {
            line-height: 1.2;
            font-size: clamp(calc(25px/3), calc(25vw/7.2), 25px);
            padding: clamp(calc(10px/3), calc(10vw/7.2), 10px) clamp(calc(18px/3), calc(18vw/7.2), 18px);
            border-radius: clamp(calc(5px/3), calc(5vw/7.2), 5px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        button-back {
            font-size: clamp(calc(15px/3), calc(15vw/7.2), 15px);
            padding: clamp(calc(8px/3), calc(8vw/7.2), 8px) clamp(calc(12px/3), calc(12vw/7.2), 12px);
            border-radius: clamp(calc(6px/3), calc(6vw/7.2), 6px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button-back:hover {
            background: #1f55c4;
        }

        .tab1 {
            margin-left: clamp(calc(25px/3), calc(25vw/7.2), 25px);
        }

        .tab2 {
            margin-left: clamp(calc(50px/3), calc(50vw/7.2), 50px);
        }

        #scrollMenu {
            max-height: 300px;
            overflow-y: auto;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            border: clamp(calc(1px/3), calc(1vw/7.2), 1px) solid #ccc;
            padding: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            margin-top: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            text-align: left;
            white-space: nowrap;
        }

        #answerOptions label {
            display: block;
            align-items: center;
            margin-bottom: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            cursor: pointer;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        #answerOptions input[type="radio"] {
            margin-right: clamp(calc(8px/3), calc(8vw/7.2), 8px);
        }

        #answerOptions br {
            display: none;
        }

        .large-textbox {
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .large-textarea {
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            font-family: Arial, sans-serif;
            width: clamp(calc(500px/3), calc(500vw/7.2), 500px);
            height: clamp(calc(100px/3), calc(100vw/7.2), 100px);
            resize: none;
        }

        td:nth-child(2) {
            white-space: nowrap;
        }

        td:nth-child(1) {
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="quiz-container">
        <h1>Histology Stain Quiz</h1>

        <div class="category">
            <span class="question">Answer the following questions. Spelling counts!</span><br>
            <img id="quizImage" src="" alt="Good luck!" /><br>

            <br><span>What stain is this?</span><br>
            <input type="text" class="large-textbox" id="stain_id"></input><br>
            <span id="fb_stain_id"></span><br>

            <br><span>What is being demonstrated?</span><br>
            <input type="text" class="large-textbox" id="demonstrating"></input><br>
            <span id="fb_demonstrating"></span><br>

            <br><span>In what color?</span><br>
            <input type="text" class="large-textbox" id="color"></input><br>
            <span id="fb_color"></span><br>

            <br><span>What is the principle?</span><br>
            <input type="text" class="large-textbox" id="principle"></input><br>
            <span id="fb_principle"></span><br>

            <br><span>What is used as a control?</span><br>
            <input type="text" class="large-textbox" id="control"></input><br>
            <span id="fb_control"></span></input>

            <div id="answerOptions" style="margin-top: 15px"></div>
            <div id="feedback" style="margin-top: 10px; font-weight: bold"></div><br>
            <button onclick="checkAnswer()">Check Answer</button>

            <br><br>
            <button onclick="nextStain()">Next Stain</button>

            <br><br>
            <hr><br>

            <button-back id="muteBtn">🔊 Mute</button-back>
            <br><br><br>
            <button-back onclick="Home()">🏠 Home</button-back>


        </div>
    </div>

    <script>
        let imageDatabase = [];
        let currentItem = null;

        fetch("histologyImageDatabase.json")
            .then(res => res.json())
            .then(data => {
                imageDatabase = data;
                nextStain();
            })
            .catch(err => console.error("Error loading JSON:", err));

        function nextStain() {
            clearInputs();

            if (imageDatabase.length === 0) {
                console.error("JSON not loaded or empty");
                return;
            }

            const randomIndex = Math.floor(Math.random() * imageDatabase.length);
            currentItem = imageDatabase[randomIndex];

            console.log("Loaded item:", currentItem);

            document.getElementById("quizImage").src = currentItem.image;

            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function clearInputs() {
            const fields = ["stain_id", "demonstrating", "color", "principle", "control"];
            fields.forEach(id => {
                document.getElementById(id).value = "";
                document.getElementById("fb_" + id).textContent = "";
            });
            document.getElementById("feedback").textContent = "";
        }

        function normalize(str) {
            return str
                .toLowerCase()
                .trim()
                .replace(/-/g, " ")
                .replace(/[^a-z0-9\s/]/g, "")
                .replace(/\s+/g, " ");
        }

        function similarity(a, b) {
            const matrix = [];
            const lenA = a.length, lenB = b.length;

            for (let i = 0; i <= lenB; i++) matrix[i] = [i];
            for (let j = 0; j <= lenA; j++) matrix[0][j] = j;

            for (let i = 1; i <= lenB; i++) {
                for (let j = 1; j <= lenA; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
                    else matrix[i][j] = Math.min(
                        matrix[i - 1][j - 1] + 1,
                        matrix[i][j - 1] + 1,
                        matrix[i - 1][j] + 1
                    );
                }
            }
            return 1 - matrix[lenB][lenA] / Math.max(lenA, lenB);
        }

        function checkField(field, correctValues) {
            const inputEl = document.getElementById(field);
            const fbEl = document.getElementById("fb_" + field);
            const userAnswer = normalize(inputEl.value);

            let answersList;

            if (typeof correctValues === "string") {
                answersList = [[[correctValues]]];
            } else if (Array.isArray(correctValues)) {
                if (correctValues.length === 0) return false;
                if (Array.isArray(correctValues[0])) {
                    if (typeof correctValues[0][0] === "string") {
                        answersList = [[correctValues]];
                    } else {
                        answersList = correctValues;
                    }
                } else {
                    answersList = [[correctValues]];
                }
            } else {
                console.error("Unsupported answer format for field:", field);
                return false;
            }

            let isCorrectOverall = false;
            let feedbackText = "";

            for (let answerGroups of answersList) {
                let isCorrectVariant = true;
                let closeEnough = false;
                let closestMatches = [];

                for (let group of answerGroups) {
                    const normalizedMap = {};
                    const normalizedGroup = group.map(a => {
                        const norm = normalize(a);
                        normalizedMap[norm] = a;
                        return norm;
                    });

                    let groupMatch = null;
                    let exactMatch = false;

                    for (let normAnswer of normalizedGroup) {
                        if (userAnswer === normAnswer) {
                            groupMatch = normalizedMap[normAnswer];
                            exactMatch = true;
                            break;
                        } else if (field !== "stain_id" && similarity(userAnswer, normAnswer) > 0.8) {
                            groupMatch = normalizedMap[normAnswer];
                            exactMatch = false;
                            break;
                        }
                    }

                    if (groupMatch) {
                        closestMatches.push(groupMatch);
                        if (!exactMatch) closeEnough = true;
                    } else {
                        isCorrectVariant = false;
                        closestMatches.push(group.join(" or "));
                    }
                }

                if (isCorrectVariant) {
                    isCorrectOverall = true;
                    feedbackText = (closeEnough && field !== "stain_id")
                        ? `✔ Close enough!: ${closestMatches.join(" and ")}`
                        : `✔ Correct: ${closestMatches.join(" and ")}`;
                    break;
                } else {
                    feedbackText = `✖ Wrong. Correct answer: ${closestMatches.join(" and ")}`;
                }
            }

            fbEl.textContent = feedbackText;
            fbEl.style.color = isCorrectOverall ? "green" : "red";

            return isCorrectOverall;
        }

        function checkAnswer() {
            if (!currentItem) return;

            let correctCount = 0;

            if (checkField("stain_id", currentItem.stain_id)) correctCount++;
            if (checkField("demonstrating", currentItem.demonstrating)) correctCount++;
            if (checkField("color", currentItem.color)) correctCount++;
            if (checkField("principle", currentItem.principle)) correctCount++;
            if (checkField("control", currentItem.control)) correctCount++;

            const feedbackEl = document.getElementById("feedback");
            if (correctCount === 5) {
                feedbackEl.textContent = "Perfect! 🎉";
                feedbackEl.style.color = "green";
                playCorrect();
            } else {
                feedbackEl.textContent = `${correctCount}/5 correct`;
                feedbackEl.style.color = "orange";
                playWrong();
            }
        }

        let muted = true;
        let juneEnabled = false;
        const correctSound = new Audio();
        const wrongSound = new Audio();
        const muteBtn = document.getElementById("muteBtn");

        muteBtn.textContent = "🔇 Unmute";

        function updateSounds() {
            if (juneEnabled) {
                correctSound.src = "sounds/June - I'm eating yogurt.wav";
                wrongSound.src = "sounds/June - Yell 2 (Short).wav";
                document.body.style.backgroundImage = "url('June.jpg')";
                document.body.style.backgroundSize = "33.33vw auto";
                document.body.style.backgroundRepeat = "repeat";
                document.body.style.backgroundPosition = "top left";
            } else {
                correctSound.src = "sounds/correct.mp3";
                wrongSound.src = "";
                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#f5f7fa";
            }
            correctSound.muted = muted;
            wrongSound.muted = muted;
        }

        function playCorrect() {
            if (!muted && correctSound.src) {
                correctSound.currentTime = 0;
                correctSound.play().catch(() => { });
            }
        }

        function playWrong() {
            if (!muted && wrongSound.src) {
                wrongSound.currentTime = 0;
                wrongSound.play().catch(() => { });
            }
        }

        function toggleMute() {
            muted = !muted;
            correctSound.muted = muted;
            wrongSound.muted = muted;
            muteBtn.textContent = muted ? "🔇 Unmute" : "🔊 Mute";
        }

        muteBtn.addEventListener("click", toggleMute);
        
        document.addEventListener('keydown', (event) => {
            if (event.key === 'j') {
                juneEnabled = !juneEnabled;
                updateSounds();
            }
        });

        updateSounds();

        function Home() {
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
