<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histology Stain Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 40px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .quiz-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .category {
            display: inline-block;
            text-align: left;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            font-size: large;
        }

        label {
            display: block;
            margin: 6px 0;
            cursor: pointer;
        }

        .category-title {
            font-weight: bold;
            font-size: 20px;
        }

        .question {
            font-size: 24px;
            font-weight: bold;
        }

        .large-textbox {
            font-size: large;
        }

        button {
            font-size: 22px;
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        .button-back {
            font-size: 15px;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        .button-back:hover {
            background: #1f55c4;
        }

        #quizImage {
            margin-top: 20px;
            max-width: 100%;
            height: auto;
            border: 2px solid #ccc;
            border-radius: 6px;
        }

        #answerOptions label {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
        }

        #answerOptions br {
            display: none;
        }
    </style>
</head>

<body>
    <div class="quiz-container">
        <h1>Histology Stain Quiz</h1>

        <div class="category">
            <span class="question">Answer the following questions. Spelling counts!</span><br />
            <img id="quizImage" src="" alt="Good luck!" /><br />
            <br /><label >What stain is this?</label>
            <input type="text" style="width: 500px; height: 20px;" class="large-textbox" id="stain_id"></input><br />
            <span id="fb_stain_id"></span><br />
            <br /><label>What is being demonstrated?</label>
            <input type="text" style="width: 500px; height: 20px;" class="large-textbox" id="demonstrating"></input><br />
            <span id="fb_demonstrating"></span><br />
            <br /><label>In what color?</label>
            <input type="text" style="width: 500px; height: 20px;" class="large-textbox" id="color"></input><br />
            <span id="fb_color"></span><br />
            <br /><label>What is the principle?</label>
            <input type="text" style="width: 500px; height: 20px;" class="large-textbox" id="principle"></input><br />
            <span id="fb_principle"></span><br />
            <br /><label>What is used as a control?</label>
            <input type="text" style="width: 500px; height: 20px;" class="large-textbox" id="control"></input><br />
            <span id="fb_control"></span></input>
            <div id="answerOptions" style="margin-top: 15px"></div>
            <div id="feedback" style="margin-top: 10px; font-weight: bold"></div><br />
            <button onclick="checkAnswer()">Check Answer</button>

            <br /><br />
            <button onclick="nextStain()">Next Stain</button>
        </div>

        <hr />
        <br />

        <button class="button-back" onclick="Home()">Home</button><br><br>
        <button class="button-back" id="muteBtn">🔊 Mute</button>
    </div>

    <div style="height:2000px;"></div>

    <label class="tab2">
        <input type="checkbox" id="june_feedback">
        Junea Noises
    </label>

    <script>
        let imageDatabase = [];
        let currentItem = null;

        fetch("histologyImageDatabase.json")
            .then(res => res.json())
            .then(data => {
                imageDatabase = data;
                nextStain();
            })
            .catch(err => console.error("Error loading JSON:", err));

        function nextStain() {
            clearInputs();

            if (imageDatabase.length === 0) {
                console.error("JSON not loaded or empty");
                return;
            }

            const randomIndex = Math.floor(Math.random() * imageDatabase.length);
            currentItem = imageDatabase[randomIndex];

            console.log("Loaded item:", currentItem); // 🔥 DEBUG

            document.getElementById("quizImage").src = currentItem.image;
        }

        function clearInputs() {
            const fields = ["stain_id", "demonstrating", "color", "principle", "control"];

            fields.forEach(id => {
                document.getElementById(id).value = "";
                document.getElementById("fb_" + id).textContent = "";
            });

            document.getElementById("feedback").textContent = "";
        }

        function normalize(str) {
            return str
                .toLowerCase()
                .trim()
                .replace(/-/g, " ")
                .replace(/[^a-z0-9\s]/g, "")
                .replace(/\s+/g, " ");
        }

        function similarity(a, b) {
            const matrix = [];

            const lenA = a.length;
            const lenB = b.length;

            for (let i = 0; i <= lenB; i++) {
                matrix[i] = [i];
            }

            for (let j = 0; j <= lenA; j++) {
                matrix[0][j] = j;
            }

            for (let i = 1; i <= lenB; i++) {
                for (let j = 1; j <= lenA; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }
                }
            }

            const distance = matrix[lenB][lenA];
            return 1 - distance / Math.max(lenA, lenB);
        }

        function checkField(field, correctValue) {
    const inputEl = document.getElementById(field);
    const fbEl = document.getElementById("fb_" + field);

    const userAnswer = normalize(inputEl.value);

    const correctAnswers = Array.isArray(correctValue)
        ? correctValue.map(a => normalize(a))
        : [normalize(correctValue)];

    let isCorrect = false;
    let isClose = false;
    let bestMatch = correctAnswers[0];

    if (field === "stain_id") {
        for (let answer of correctAnswers) {
            if (userAnswer === answer) {
                isCorrect = true;
                bestMatch = answer;
                break;
            }
        }

        if (isCorrect) {
            fbEl.textContent = `✔ Correct: ${bestMatch}`;
            fbEl.style.color = "green";
            return true;
        } else {
            fbEl.textContent = `✖ Wrong. Correct: ${bestMatch}`;
            fbEl.style.color = "red";
            return false;
        }
    }

    for (let answer of correctAnswers) {
        const score = similarity(userAnswer, answer);

        if (userAnswer === answer) {
            isCorrect = true;
            bestMatch = answer;
            break;
        } else if (score > 0.8) {
            isCorrect = true;
            isClose = true;
            bestMatch = answer;
            break;
        }
    }

    if (isCorrect) {
        fbEl.textContent = isClose
            ? `✔ Close enough! Correct: ${bestMatch}`
            : `✔ Correct: ${bestMatch}`;
        fbEl.style.color = "green";
        return true;
    } else {
        fbEl.textContent = `✖ Wrong. Correct: ${bestMatch}`;
        fbEl.style.color = "red";
        return false;
    }
}

        function checkAnswer() {
            if (!currentItem) return;

            let correctCount = 0;

            if (checkField("stain_id", currentItem.stain_id)) correctCount++;
            if (checkField("demonstrating", currentItem.demonstrating)) correctCount++;
            if (checkField("color", currentItem.color)) correctCount++;
            if (checkField("principle", currentItem.principle)) correctCount++;
            if (checkField("control", currentItem.control)) correctCount++;

            const feedbackEl = document.getElementById("feedback");

            if (correctCount === 5) {
                feedbackEl.textContent = "Perfect! 🎉";
                feedbackEl.style.color = "green";
                playCorrect();
            } else {
                feedbackEl.textContent = `${correctCount}/5 correct`;
                feedbackEl.style.color = "orange";
                playWrong();
            }
        }

        let muted = true;

        const correctSound = new Audio();
        const wrongSound = new Audio();

        const muteBtn = document.getElementById("muteBtn");
        const juneCheckbox = document.getElementById("june_feedback");

        muteBtn.textContent = "🔇 Unmute";

        function updateSounds() {
            const juneEnabled = juneCheckbox.checked;

            if (juneEnabled) {
                correctSound.src = "sounds/June - One more.wav";
                wrongSound.src = "sounds/June - Yell 2 (Short).wav";

                document.body.style.backgroundImage = "url('June.jpg')";

            } else {
                correctSound.src = "sounds/correct.mp3";
                wrongSound.src = "";

                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#ffffff";
            }

            correctSound.muted = muted;
            wrongSound.muted = muted;
        }

        function playCorrect() {
            if (!muted && correctSound.src) {
                correctSound.currentTime = 0;
                correctSound.play().catch(() => { });
            }
        }

        function playWrong() {
            if (!muted && wrongSound.src) {
                wrongSound.currentTime = 0;
                wrongSound.play().catch(() => { });
            }
        }

        function toggleMute() {
            muted = !muted;

            correctSound.muted = muted;
            wrongSound.muted = muted;

            muteBtn.textContent = muted ? "🔇 Unmute" : "🔊 Mute";
        }

        muteBtn.addEventListener("click", toggleMute);
        juneCheckbox.addEventListener("change", updateSounds);

        updateSounds();

        function Home() {
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
