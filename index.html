<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLT Quizzes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            background: #f5f7fa;
            margin: clamp(calc(40px/3), calc(40vw/7.2), 40px);
            padding-right: 5vw;
            padding-left: 5vw;
            white-space: nowrap;
        }

        h1 {
            margin-bottom: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            font-size: clamp(calc(36px/3), calc(36vw/7.2), 36px);
        }

        h2 {
            font-size: clamp(calc(27px/3), calc(27vw/7.2), 27px);
        }

        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .category {
            display: inline-block;
            text-align: left;
            width: 100%;
            background: white;
            padding: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            border-radius: clamp(calc(8px/3), calc(8vw/7.2), 8px);
            box-shadow: 0 clamp(calc(2px/3), calc(2vw/7.2), 2px) clamp(calc(6px/3), calc(6vw/7.2), 6px) rgba(0, 0, 0, 0.1);
            margin-bottom: clamp(calc(15px/3), calc(15vw/7.2), 15px);
            box-sizing: border-box;
        }

        label {
            display: block;
            margin: clamp(calc(6px/3), calc(6vw/7.2), 6px) 0;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            cursor: text;
        }

        .category-title {
            font-size: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            font-weight: bold;
        }

        .question {
            font-size: clamp(calc(24px/3), calc(24vw/7.2), 24px);
            font-weight: bold;
        }

        .main-title {
            font-size: clamp(calc(24px/3), calc(24vw/7.2), 24px);
            font-weight: bold;
        }

        #quizImage {
            margin-top: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            max-width: 100%;
            height: auto;
            border: clamp(calc(2px/3), calc(2vw/7.2), 2px) solid #ccc;
            border-radius: clamp(calc(6px/3), calc(6vw/7.2), 6px);
        }

        button {
            line-height: 1.2;
            font-size: clamp(calc(25px/3), calc(25vw/7.2), 25px);
            padding: clamp(calc(10px/3), calc(10vw/7.2), 10px) clamp(calc(18px/3), calc(18vw/7.2), 18px);
            border-radius: clamp(calc(5px/3), calc(5vw/7.2), 5px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        button-back {
            font-size: clamp(calc(15px/3), calc(15vw/7.2), 15px);
            padding: clamp(calc(8px/3), calc(8vw/7.2), 8px) clamp(calc(12px/3), calc(12vw/7.2), 12px);
            border-radius: clamp(calc(6px/3), calc(6vw/7.2), 6px);
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button-back:hover {
            background: #1f55c4;
        }

        .tab1 {
            margin-left: clamp(calc(25px/3), calc(25vw/7.2), 25px);
        }

        .tab2 {
            margin-left: clamp(calc(50px/3), calc(50vw/7.2), 50px);
        }

        #scrollMenu {
            max-height: 300px;
            overflow-y: auto;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            border: clamp(calc(1px/3), calc(1vw/7.2), 1px) solid #ccc;
            padding: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            margin-top: clamp(calc(20px/3), calc(20vw/7.2), 20px);
            text-align: left;
            white-space: nowrap;
        }

        #answerOptions label {
            display: block;
            align-items: center;
            margin-bottom: clamp(calc(10px/3), calc(10vw/7.2), 10px);
            cursor: pointer;
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        #answerOptions input[type="radio"] {
            margin-right: clamp(calc(8px/3), calc(8vw/7.2), 8px);
        }

        #answerOptions br {
            display: none;
        }

        .large-textbox {
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
        }

        .large-textarea {
            font-size: clamp(calc(18px/3), calc(18vw/7.2), 18px);
            font-family: Arial, sans-serif;
            width: clamp(calc(500px/3), calc(500vw/7.2), 500px);
            height: clamp(calc(100px/3), calc(100vw/7.2), 100px);
            resize: none;
        }

        td:nth-child(2) {
            white-space: nowrap;
        }

        td:nth-child(1) {
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <h1>Welcome to MLT Quizzes!</h1>
    <h2>Select the department you'd like to study</h2>

    <div class="category">
        <button onclick="Chemistry()">🧪 Chemistry</button>
        <label>Started Correlation Quiz. Adding more case studies soon!</label>
        <br><br>

        <button onclick="Hematology()">🩸Hematology</button>
        <label>Cell ID Quiz in final stages! Others not started.</label>
        <br><br>

        <button onclick="Histology()">🔬 Histology</button>
        <label>Final stages! Adding tissue identification in the future.</label>
        <br><br>

        <button onclick="Microbiology()">🧫 Microbiology</button>
        <label>Not started.</label>
        <br><br>

        <button onclick="Transfusions()">🆎 Transfusions</button>
        <label>Not started.</label>
        <br><br>

        <hr>
        <br><br>

        <label>Have any suggestions or feedback?</label>
        <button onclick="Feedback()">✉️ Contact Me</button>
        <br><br>
    </div>

    <script>

        function Chemistry() {
            window.location.href = "chemistry_choices.html";
        }

        function Hematology() {
            window.location.href = "hematology_choice.html";
        }

        function Transfusions() {
            window.location.href = "";
        }

        function Microbiology() {
            window.location.href = "";
        }

        function Histology() {
            window.location.href = "histology_quiz.html";
        }

        function Feedback() {
            window.location.href = "feedback.html";
        }
    </script>
</body>

</html>
