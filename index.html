<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLT Quizzes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: large;
            background: #f5f7fa;
            margin: 40px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .quiz-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .category {
            display: inline-block;
            text-align: left;
            width: 100%;
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin: 6px 0;
            cursor: pointer;
        }

        .category-title {
            font-weight: bold;
            font-size: 20px;
        }

        .question {
            font-size: 24px;
            font-weight: bold;
        }

        .main-title {
            font-size: 24px;
            font-weight: bold;
        }

        #quizImage {
            margin-top: 20px;
            max-width: 100%;
            height: auto;
            border: 2px solid #ccc;
            border-radius: 6px;
        }

        button {
            font-size: 25px;
            padding: 10px 18px;
            border-radius: 5px;
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1f55c4;
        }

        button-back {
            font-size: 15px;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button-back:hover {
            background: #1f55c4;
        }

        #scrollMenu {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 20px;
            text-align: left;
        }

        #answerOptions label {
            display: block;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: large;
        }

        #answerOptions input[type="radio"] {
            margin-right: 8px;
        }

        #answerOptions br {
            display: none;
        }

        .large-textbox {
            font-size: large;
        }
    </style>
</head>

<body>
    <h1>Welcome to MLT Quizzes!</h1>
    <h2>Select the department you'd like to study</h2>

    <div class="category">
        <button onclick="Chemistry()">Chemistry</button>
        <label>Started Correlation Quiz. Adding more case studies soon!</label>
        <br><br>

        <button onclick="Hematology()">Hematology</button>
        <label>Cell ID Quiz in final stages! Others not started.</label>
        <br><br>

        <button onclick="Histology()">Histology</button>
        <label>Final stages! Adding tissue identification in the future.</label>
        <br><br>

        <button onclick="Microbiology()">Microbiology</button>
        <label>Not started.</label>
        <br><br>

        <button onclick="Transfusions()">Transfusions</button>
        <label>Not started.</label>
    </div>

    <script>

        function Chemistry() {
            window.location.href = "chemistry_choices.html";
        }

        function Hematology() {
            window.location.href = "hematology_choice.html";
        }

        function Transfusions() {
            window.location.href = "";
        }

        function Microbiology() {
            window.location.href = "";
        }

        function Histology() {
            window.location.href = "histology_quiz.html";
        }

    </script>
</body>

</html>
